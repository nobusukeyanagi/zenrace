<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#090909">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>本日のレース | ZENRACE</title>
<link rel="stylesheet" href="../shared/category-menu.css?v=57">
<link rel="stylesheet" href="../shared/page-shell.css?v=19">
<link rel="stylesheet" href="today-races.css?v=21">
<script src="../shared/category-menu.js?v=50" defer></script>
<script src="../shared/fixed-layout.js?v=20" defer></script>
<script src="../shared/bottom-nav.js?v=60" defer></script>
<script src="../vote/race-switch.js?v=66" defer></script>
<script src="race-days.js?v=6" defer></script>
<script src="today-races.js?v=22" defer></script>
</head>
<body>
<zenrace-category-menu category="schedule" active="today"></zenrace-category-menu>
<div class="date-toolbar" aria-label="日付選択">
  <div class="date-toolbar-side left"><button class="update-btn" id="refreshRaces">更新</button></div>
  <div class="date-nav">
    <button class="date-arrow" id="prevDate" aria-label="前日">‹</button>
    <div class="date-title" id="dateTitle"></div>
    <button class="date-arrow" id="nextDate" aria-label="翌日">›</button>
  </div>
  <div class="date-toolbar-side right"><button class="today-btn" id="todayBtn">当日</button></div>
</div>
<div class="zenrace-content-shell">
  <div class="zenrace-content-sizer">
    <div class="zenrace-content-stage">
      <main class="today-page">
        <section class="today-board" id="todayBoard" aria-label="本日のレース一覧"></section>
      </main>
    </div>
  </div>
</div>
<zenrace-bottom-nav active="schedule"></zenrace-bottom-nav>
</body>
</html>
