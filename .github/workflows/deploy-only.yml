name: Deploy website only

on:
  workflow_dispatch:

concurrency:
  group: zenrace-pages-deployment
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Prepare Pages files
        run: |
          rm -rf _site
          mkdir -p _site/gradedraces _site/shared

          # ホーム
          cp index.html _site/index.html

          # 全ページ共通ファイル
          cp -R shared/. _site/shared/

          # グレードレース
          cp gradedraces/index.html _site/gradedraces/index.html
          cp gradedraces/graded_races_schedule.html             _site/gradedraces/graded_races_schedule.html
          cp gradedraces/races.json _site/gradedraces/races.json

          # 競技ピクトグラムなどの画像
          if [ -d gradedraces/icons ]; then
            cp -R gradedraces/icons _site/gradedraces/icons
          fi

          # Jekyll処理を行わず、そのまま公開
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy website
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
