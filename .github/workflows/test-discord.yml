name: Test Discord notification

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send test notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          webhook_url = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          if not webhook_url:
              print("DISCORD_WEBHOOK_URL が設定されていません。", file=sys.stderr)
              raise SystemExit(1)

          repository = os.environ.get("REPOSITORY", "")
          run_id = os.environ.get("RUN_ID", "")
          server_url = os.environ.get("SERVER_URL", "https://github.com")
          run_url = f"{server_url}/{repository}/actions/runs/{run_id}"
          now = datetime.now(ZoneInfo("Asia/Tokyo")).strftime("%Y年%m月%d日 %H:%M:%S")

          message = (
              "**公営競技重賞日程：Discord通知テスト**\n\n"
              "GitHub Actionsから正常に通知されました。\n"
              f"実行時刻：{now}\n"
              f"リポジトリ：`{repository}`\n"
              f"<{run_url}>"
          )

          payload = json.dumps(
              {
                  "content": message,
                  "username": "公営競技重賞日程",
                  "allowed_mentions": {"parse": []},
              },
              ensure_ascii=False,
          ).encode("utf-8")

          request = urllib.request.Request(
              webhook_url,
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "zenrace-gradedraces/1.0",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  if response.status not in (200, 204):
                      raise RuntimeError(
                          f"Discord通知に失敗しました: HTTP {response.status}"
                      )
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(
                  f"Discord通知に失敗しました: HTTP {exc.code} {body}",
                  file=sys.stderr,
              )
              raise SystemExit(1) from exc
          except urllib.error.URLError as exc:
              print(
                  f"Discordへ接続できませんでした: {exc.reason}",
                  file=sys.stderr,
              )
              raise SystemExit(1) from exc

          print("Discordへテスト通知を送信しました。")
          PY
