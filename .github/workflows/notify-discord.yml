name: Notify Discord

on:
  schedule:
    # 日本時間 毎朝6:17（UTCでは前日21:17）
    - cron: '17 21 * * *'
    # 予備実行：日本時間 毎朝6:47。通知済みなら自動で何もしない。
    - cron: '47 21 * * *'
  workflow_dispatch:
    inputs:
      notify_date:
        description: '通知する日付 YYYY-MM-DD（空欄なら日本時間の当日）'
        required: false
        type: string
      force_notify:
        description: '同じ日付を通知済みでも再送する'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: notify-discord
  cancel-in-progress: false

jobs:
  notify:
    name: Send graded races to Discord
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Send graded races
        working-directory: gradedraces
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
          NOTIFY_DATE: ${{ inputs.notify_date }}
          FORCE_NOTIFY: ${{ inputs.force_notify }}
        run: python scripts/send_discord.py

      - name: Save notification state
        run: |
          STATE='gradedraces/discord_notification_state.json'

          if [ ! -f "$STATE" ]; then
            echo '通知状態に変更はありません。'
            exit 0
          fi

          git config user.name 'graded-races-bot'
          git config user.email 'graded-races-bot@users.noreply.github.com'
          git add "$STATE"

          if git diff --cached --quiet; then
            echo '通知状態に変更はありません。'
          else
            git commit -m 'Save Discord notification state'
            git pull --rebase origin main
            git push origin HEAD:main
          fi
