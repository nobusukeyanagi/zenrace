name: Graded-race Update

on:
  schedule:
    # 日本時間の毎日25:00（暦上は翌日01:00）。UTCでは前日16:00。
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      base_date:
        description: '基準日 YYYY-MM-DD（空欄なら日本時間の当日）'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: graded-race-update
  cancel-in-progress: false

jobs:
  update:
    name: Daily integrated update
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: gradedraces/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r gradedraces/requirements.txt

      - name: Run integrated official update
        working-directory: gradedraces
        env:
          BASE_DATE: ${{ inputs.base_date }}
        run: |
          if [ -n "$BASE_DATE" ]; then
            python -m scripts.daily_update \
              --date "$BASE_DATE" \
              --fail-if-all-sources-fail
          else
            python -m scripts.daily_update \
              --fail-if-all-sources-fail
          fi

      - name: Write update quality summary
        if: always()
        working-directory: gradedraces
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def load(name):
              path = Path(name)
              return json.loads(path.read_text(encoding='utf-8')) if path.exists() else {}

          daily = load('daily_update_report.json')
          master = load('master_schedule_report.json')
          incomplete = load('incomplete_records.json')
          detail_status = load('source_status.json')
          summary = daily.get('summary', {})
          lines = [
              '# Graded-race Update',
              '',
              '## Integrated result',
              f"- 公式日程取得: {summary.get('master_official_records', 0)}件",
              f"- 新規レース追加: {summary.get('master_added', 0)}件",
              f"- 基本情報更新: {summary.get('master_updated', 0)}件",
              f"- 公式日程との照合要確認: {summary.get('master_review_required', 0)}件",
              f"- 重複候補: {summary.get('master_duplicates', 0)}件",
              f"- 個別ページ確認対象: {summary.get('detail_targets', 0)}件",
              f"- 発走時刻・優勝者等の更新: {summary.get('detail_changes', 0)}件",
              f"- 終了済み未解決: {incomplete.get('past_unresolved_count', 0)}件",
              f"- 開催前の時刻未公開: {incomplete.get('upcoming_missing_time_count', 0)}件",
              '',
              '## Official schedules',
          ]
          for source in master.get('sources', []):
              state = 'OK' if source.get('ok') else 'FAILED'
              lines.append(
                  f"- {source.get('name', '')}: {state}, "
                  f"records={source.get('record_count', 0)}, warnings={len(source.get('warnings', []))}"
              )
          lines.append('')
          lines.append('## Detail sources')
          for source in detail_status.get('sources', []):
              state = 'OK' if source.get('ok') else 'FAILED'
              lines.append(
                  f"- {source.get('name', '')}: {state}, "
                  f"patches={source.get('patch_count', 0)}, warnings={len(source.get('warnings', []))}"
              )
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as output:
              output.write('\n'.join(lines) + '\n')
          PY

      - name: Commit updated website data
        run: |
          git config user.name 'graded-races-bot'
          git config user.email 'graded-races-bot@users.noreply.github.com'

          DATA_CHANGED=0
          if ! git diff --quiet -- \
            gradedraces/races.json \
            gradedraces/graded_races_schedule.html \
            gradedraces/index.html; then
            DATA_CHANGED=1
          fi

          git add \
            gradedraces/races.json \
            gradedraces/graded_races_schedule.html \
            gradedraces/index.html \
            gradedraces/schedule_sync_state.json

          # 実データが変わった実行だけ、調査用レポートも履歴に残す。
          if [ "$DATA_CHANGED" = '1' ]; then
            [ -f gradedraces/changes.json ] && git add gradedraces/changes.json || true
            [ -f gradedraces/source_status.json ] && git add gradedraces/source_status.json || true
            [ -f gradedraces/incomplete_records.json ] && git add gradedraces/incomplete_records.json || true
            [ -f gradedraces/master_schedule_report.json ] && git add gradedraces/master_schedule_report.json || true
            [ -f gradedraces/daily_update_report.json ] && git add gradedraces/daily_update_report.json || true
          fi

          if git diff --cached --quiet; then
            echo 'グレードレース情報の変更はありません。'
          else
            git commit -m 'Update graded races (daily integrated)'
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Upload update reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graded-race-update-report
          path: |
            gradedraces/daily_update_report.json
            gradedraces/master_schedule_report.json
            gradedraces/changes.json
            gradedraces/source_status.json
            gradedraces/incomplete_records.json
            gradedraces/schedule_sync_state.json
          if-no-files-found: ignore
          retention-days: 30
