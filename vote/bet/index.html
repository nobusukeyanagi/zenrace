<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" name="viewport"/>
<meta content="#090909" name="theme-color"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<title>投票 | ZENRACE</title>
<link href="../../shared/category-menu.css?v=57" rel="stylesheet"/>
<link href="../../shared/page-shell.css?v=19" rel="stylesheet"/><link href="../race-switch.css?v=61" rel="stylesheet"/>
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;--gold:#f0cc70;--gold2:#fff0bd}
*{box-sizing:border-box}
html{background:#050608}
body{color:#f7f8fa;background:radial-gradient(circle at 88% 6%,rgba(240,204,112,.17),transparent 28rem),linear-gradient(145deg,#171717,#050608 60%,#0e0b06)}
button,select,input{font:inherit}
.vote-page{width:min(calc(100% - 22px),760px);margin:0 auto;padding:14px 0 34px}
.race-meta{position:relative;z-index:1;margin-top:16px;display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid rgba(255,255,255,.10)}
.meta{padding:12px 4px 0;text-align:center;border-right:1px solid rgba(255,255,255,.08)}.meta:last-child{border-right:0}
.meta small{display:block;color:#8f98a6;font-size:9px;font-weight:800;letter-spacing:.1em}.meta strong{display:block;margin-top:4px;color:#fff;font-size:16px;font-weight:950}
.panel{margin-top:12px;overflow:hidden;border:1px solid rgba(240,204,112,.22);border-radius:17px;background:rgba(10,11,14,.88);box-shadow:0 14px 38px rgba(0,0,0,.3)}
.panel-title{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;color:#fff;background:linear-gradient(90deg,rgba(240,204,112,.13),transparent);border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;font-weight:950}
.panel-title span{color:#aeb6c2;font-size:10px;font-weight:750}
.entry-head,.entrant-row{display:grid;grid-template-columns:48px minmax(0,1fr) 58px 60px;align-items:center}
.entry-head{min-height:31px;color:#87919f;background:#0b0d11;font-size:9px;font-weight:850;text-align:center}
.entry-head div:nth-child(2){text-align:left}
.entrant-row{min-height:52px;border-top:1px solid rgba(255,255,255,.065);background:linear-gradient(180deg,rgba(255,255,255,.025),transparent)}
.car{width:31px;height:31px;margin:auto;display:grid;place-items:center;border-radius:50%;font-size:16px;font-weight:1000;box-shadow:inset 0 2px 0 rgba(255,255,255,.25),inset 0 -3px 0 rgba(0,0,0,.22),0 3px 8px rgba(0,0,0,.35)}
.car-1{background:#f4f5f7;color:#111;border:2px solid #d4d7dc}.car-2{background:#171717;color:#fff;border:2px solid #333}.car-3{background:#e51125;color:#fff}.car-4{background:#0877bd;color:#fff}.car-5{background:#f2d819;color:#111}.car-6{background:#07914a;color:#fff}.car-7{background:#ee8b10;color:#111}.car-8{background:#efa8c9;color:#111}
.rider{min-width:0;color:#fff;font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.handicap,.trial{text-align:center;font-variant-numeric:tabular-nums;font-size:12px;font-weight:850}.handicap{color:#aeb6c2}.trial{color:var(--gold2)}
.bet-types{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:12px}
.bet-types button{min-width:0;height:38px;border:1px solid rgba(240,204,112,.2);border-radius:9px;color:#dfe3e8;background:#13151a;font-size:11px;font-weight:900}
.bet-types button.active{color:#171108;border-color:#f0cc70;background:linear-gradient(180deg,#ffeaa7,#d8ab3c);box-shadow:0 0 14px rgba(240,204,112,.18)}
.selections{padding:0 12px 12px;display:grid;gap:9px}
.selection-line{display:grid;grid-template-columns:42px minmax(0,1fr);align-items:center;gap:8px}
.selection-line label{color:#c7cdd6;font-size:11px;font-weight:900}
.number-buttons{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.number-buttons button{aspect-ratio:1;border:1px solid rgba(255,255,255,.13);border-radius:50%;color:#fff;background:#15171c;font-size:12px;font-weight:950}
.number-buttons button.selected{color:#171108;border-color:#f0cc70;background:var(--gold);box-shadow:0 0 10px rgba(240,204,112,.28)}
.purchase{display:grid;grid-template-columns:minmax(0,1fr) 110px;gap:9px;padding:13px;border-top:1px solid rgba(255,255,255,.08);background:#090a0d}
.purchase-summary{min-width:0;display:flex;flex-direction:column;justify-content:center;color:#8f98a6;font-size:10px;line-height:1.55}.purchase-summary strong{color:#fff;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.amount{display:flex;align-items:center;gap:5px;margin-top:5px;color:#aeb6c2}.amount select{height:30px;min-width:88px;border:1px solid rgba(240,204,112,.25);border-radius:7px;color:#fff;background:#17191e;padding:0 7px}
.confirm{grid-column:1/-1;height:48px;border:1px solid #ffe89c;border-radius:12px;color:#171108;background:linear-gradient(180deg,#ffeaa7,#d3a438);font-size:14px;font-weight:1000;box-shadow:0 8px 20px rgba(213,164,56,.2)}
.notice{min-height:18px;margin:8px 13px 0;color:#f0cc70;font-size:10px;font-weight:800;text-align:center}
@media(max-width:360px){.race-hero h1{font-size:19px}.entrant-row{min-height:49px}.rider{font-size:13px}.number-buttons{gap:3px}.selection-line{grid-template-columns:38px minmax(0,1fr)}}
</style>
<link href="../race-info.css?v=56" rel="stylesheet"/><link href="../../shared/race-button-style.css?v=3" rel="stylesheet"/><script defer="" src="../race-info.js?v=55"></script><script defer="" src="../../shared/category-menu.js?v=49"></script>
<script defer="" src="../../shared/fixed-layout.js?v=20"></script>
<script defer="" src="../../shared/bottom-nav.js?v=60"></script><script defer="" src="../race-switch.js?v=64"></script>
</head>
<body>
<zenrace-category-menu active="bet" category="vote"></zenrace-category-menu>
<div class="zenrace-content-shell" data-zenrace-pinch-shell="">
<div class="zenrace-content-sizer" data-zenrace-pinch-sizer="">
<div class="zenrace-content-stage" data-zenrace-pinch-stage=""><zenrace-race-switch active-key="浜松-12R-16:45"></zenrace-race-switch><zenrace-race-info></zenrace-race-info>
<main class="vote-page">
<section class="panel">
<div class="panel-title">出走表 <span>ハンデ／試走タイム</span></div>
<div class="entry-head"><div>車番</div><div>選手名</div><div>ハンデ</div><div>試走</div></div>
<div class="entrant-row" data-car="1">
<div class="car car-1">1</div><div class="rider">黒川 京介</div><div class="handicap">0m</div><div class="trial">3.28</div>
</div>
<div class="entrant-row" data-car="2">
<div class="car car-2">2</div><div class="rider">鈴木 圭一郎</div><div class="handicap">0m</div><div class="trial">3.31</div>
</div>
<div class="entrant-row" data-car="3">
<div class="car car-3">3</div><div class="rider">青山 周平</div><div class="handicap">0m</div><div class="trial">3.28</div>
</div>
<div class="entrant-row" data-car="4">
<div class="car car-4">4</div><div class="rider">金子 大輔</div><div class="handicap">0m</div><div class="trial">3.27</div>
</div>
<div class="entrant-row" data-car="5">
<div class="car car-5">5</div><div class="rider">長田 稚也</div><div class="handicap">0m</div><div class="trial">3.27</div>
</div>
<div class="entrant-row" data-car="6">
<div class="car car-6">6</div><div class="rider">佐藤 励</div><div class="handicap">0m</div><div class="trial">3.28</div>
</div>
<div class="entrant-row" data-car="7">
<div class="car car-7">7</div><div class="rider">鈴木 宏和</div><div class="handicap">0m</div><div class="trial">3.29</div>
</div>
<div class="entrant-row" data-car="8">
<div class="car car-8">8</div><div class="rider">佐藤 摩弥</div><div class="handicap">0m</div><div class="trial">3.31</div>
</div>
</section>
<section class="panel">
<div class="panel-title">買い目を選択 <span>デモ画面</span></div>
<div class="bet-types" id="betTypes"><button class="active" data-type="3連単">3連単</button><button data-type="3連複">3連複</button><button data-type="2連単">2連単</button><button data-type="2連複">2連複</button></div>
<div class="selections">
<div class="selection-line" data-slot="first"><label>1着</label><div class="number-buttons"><button data-car="1" type="button">1</button><button data-car="2" type="button">2</button><button data-car="3" type="button">3</button><button data-car="4" type="button">4</button><button data-car="5" type="button">5</button><button data-car="6" type="button">6</button><button data-car="7" type="button">7</button><button data-car="8" type="button">8</button></div></div>
<div class="selection-line" data-slot="second"><label>2着</label><div class="number-buttons"><button data-car="1" type="button">1</button><button data-car="2" type="button">2</button><button data-car="3" type="button">3</button><button data-car="4" type="button">4</button><button data-car="5" type="button">5</button><button data-car="6" type="button">6</button><button data-car="7" type="button">7</button><button data-car="8" type="button">8</button></div></div>
<div class="selection-line" data-slot="third"><label>3着</label><div class="number-buttons"><button data-car="1" type="button">1</button><button data-car="2" type="button">2</button><button data-car="3" type="button">3</button><button data-car="4" type="button">4</button><button data-car="5" type="button">5</button><button data-car="6" type="button">6</button><button data-car="7" type="button">7</button><button data-car="8" type="button">8</button></div></div>
</div>
<div class="purchase">
<div class="purchase-summary"><strong id="summary">車番を選択してください</strong><div class="amount">1点あたり <select id="amount"><option>100円</option><option>500円</option><option>1,000円</option><option>5,000円</option></select></div></div>
<div></div><button class="confirm" id="confirm" type="button">投票内容を確認</button>
</div>
<p class="notice" id="notice"></p>
</section>
</main>
</div>
</div>
</div>
<zenrace-bottom-nav active="vote"></zenrace-bottom-nav>
<script>
(() => {
  const state = { type: "3連単", first: null, second: null, third: null };
  const summary = document.getElementById("summary");
  const notice = document.getElementById("notice");
  const thirdLine = document.querySelector('[data-slot="third"]');
  const update = () => {
    document.querySelectorAll('.selection-line').forEach(line => {
      const slot = line.dataset.slot;
      line.querySelectorAll('button').forEach(button => button.classList.toggle('selected', Number(button.dataset.car) === state[slot]));
    });
    const needed = state.type.startsWith('2') ? ['first','second'] : ['first','second','third'];
    const values = needed.map(key => state[key]);
    summary.textContent = values.every(Boolean) ? `${state.type}　${values.join(' - ')}` : '車番を選択してください';
  };
  document.getElementById('betTypes').addEventListener('click', event => {
    const button = event.target.closest('button[data-type]'); if (!button) return;
    state.type = button.dataset.type;
    document.querySelectorAll('#betTypes button').forEach(item => item.classList.toggle('active', item === button));
    const two = state.type.startsWith('2');
    thirdLine.hidden = two; if (two) state.third = null;
    notice.textContent = ''; update();
  });
  document.querySelector('.selections').addEventListener('click', event => {
    const button = event.target.closest('button[data-car]'); if (!button) return;
    const line = button.closest('.selection-line'); const slot = line.dataset.slot; const car = Number(button.dataset.car);
    for (const key of ['first','second','third']) if (key !== slot && state[key] === car) state[key] = null;
    state[slot] = state[slot] === car ? null : car; notice.textContent = ''; update();
  });
  document.getElementById('confirm').addEventListener('click', () => {
    const needed = state.type.startsWith('2') ? ['first','second'] : ['first','second','third'];
    notice.textContent = needed.every(key => state[key]) ? 'デモ画面のため、実際の投票は行われません。' : '必要な車番を選択してください。';
  });
  update();
})();
</script>
</body>
</html>
