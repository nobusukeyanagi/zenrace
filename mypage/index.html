<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>マイページ | ZENRACE</title>
  <link rel="stylesheet" href="../shared/header.css?v=19">
  <link rel="stylesheet" href="../shared/page-shell.css?v=19">
  <style>
    :root{color-scheme:dark;font-family:"Noto Sans JP","Yu Gothic UI","Yu Gothic",sans-serif}
    *{box-sizing:border-box}
    html{background:#030712}
    body{color:#f8fafc;background:radial-gradient(circle at 82% 10%,rgba(212,175,55,.18),transparent 24rem),linear-gradient(145deg,#111827,#030712)}
    main{min-height:100%;display:grid;place-items:center;padding:28px 20px}
    .placeholder{width:min(100%,520px);padding:42px 24px;text-align:center;border:1px solid rgba(255,255,255,.13);border-radius:22px;background:rgba(255,255,255,.055);box-shadow:0 18px 50px rgba(0,0,0,.28)}
    .placeholder h2{margin:0 0 12px;color:#fff;font-size:22px}
    .placeholder p{margin:0;color:#aeb8c8;font-size:13px;line-height:1.8}
  </style>
  <script src="../shared/fixed-layout.js?v=19" defer></script>
  <script src="../shared/bottom-nav.js?v=19" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="header-side left"></div>
    <div class="header-center"><h1 class="header-title">マイページ</h1></div>
    <div class="header-side right"></div>
  </header>

  <div class="zenrace-content-shell" data-zenrace-pinch-shell>
    <div class="zenrace-content-sizer" data-zenrace-pinch-sizer>
      <div class="zenrace-content-stage" data-zenrace-pinch-stage>
        <main>
          <section class="placeholder">
            <h2>マイページ</h2>
            <p>このページは現在準備中です。</p>
          </section>
        </main>
      </div>
    </div>
  </div>

  <zenrace-bottom-nav active="mypage"></zenrace-bottom-nav>
</body>
</html>
