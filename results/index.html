<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#090909">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>結果早見 | ZENRACE</title>
<link rel="stylesheet" href="../shared/category-menu.css?v=57">
<link rel="stylesheet" href="../shared/page-shell.css?v=19">
<link rel="stylesheet" href="../shared/date-selector.css?v=2">
<link rel="stylesheet" href="results.css?v=1">
<script src="../shared/category-menu.js?v=50" defer></script>
<script src="../shared/fixed-layout.js?v=20" defer></script>
<script src="../shared/bottom-nav.js?v=60" defer></script>
<script src="../shared/date-selector.js?v=2" defer></script>
<script src="../schedule/race-days.js?v=5" defer></script>
<script src="../vote/race-switch.js?v=66" defer></script>
<script src="results.js?v=2" defer></script>
</head>
<body>
<zenrace-category-menu category="schedule" active="quick-results"></zenrace-category-menu>
<div class="date-toolbar" data-zenrace-date-selector data-base-date="2026-02-23" data-min-date="2026-02-22" data-max-date="2026-02-24" aria-label="日付選択">
  <div class="date-toolbar-side left"><button class="update-btn" data-date-refresh>更新</button></div>
  <div class="date-nav">
    <button class="date-arrow" data-date-prev aria-label="前日">‹</button>
    <div class="date-title" data-date-title></div>
    <button class="date-arrow" data-date-next aria-label="翌日">›</button>
  </div>
  <div class="date-toolbar-side right"><button class="today-btn" data-date-today>当日</button></div>
</div>
<div class="zenrace-content-shell" data-zenrace-pinch-shell>
  <div class="zenrace-content-sizer" data-zenrace-pinch-sizer>
    <div class="zenrace-content-stage" data-zenrace-pinch-stage>
      <main class="results-page">
        <section class="results-board" id="resultsBoard" aria-label="結果早見表"></section>
      </main>
    </div>
  </div>
</div>
<zenrace-bottom-nav active="schedule"></zenrace-bottom-nav>
</body>
</html>
