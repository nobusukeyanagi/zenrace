<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ONAIR | ZENRACE</title>
<style>
:root{--w:540px;--h:1074px;--fade:260ms}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;overscroll-behavior:none;touch-action:manipulation;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif}
#appViewport{position:fixed;left:0;right:0;top:var(--visual-top,0px);bottom:calc(var(--visual-bottom,0px) + var(--bottom-nav-total-h,62px));overflow:hidden;background:#020713 url("assets/personality_bg_mobile.webp") center/cover no-repeat;contain:strict;touch-action:none}
#stage{position:absolute;left:0;top:0;width:var(--w);height:var(--h);overflow:hidden;background:transparent;isolation:isolate;will-change:transform}
.layer{position:absolute;border:0;margin:0;padding:0;overflow:hidden;pointer-events:none;opacity:0;transition:opacity var(--fade) linear}
.layer.show{opacity:1}.layer.no-fade{transition:none}iframe.layer{background:transparent}.bg{left:0;top:0;width:540px;height:1074px;z-index:0}
.personality-bg{background:url("assets/personality_bg_mobile.webp") center/cover no-repeat}
.personality-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 18%,rgba(4,10,30,.16),transparent 34%),linear-gradient(180deg,rgba(0,0,0,.08),transparent 45%,rgba(0,0,0,.10))}
.status-live{left:0;top:0;width:540px;height:64px;z-index:50}.banner{left:0;top:65px;width:540px;height:275px;z-index:30}
.vote-button-layer{left:30px;top:384px;width:150px;height:150px;z-index:45}.chat{left:0;top:0;width:540px;height:750px;z-index:42}
.comment-stream{left:0;top:575px;width:430px;height:370px;z-index:60}.input{left:0;top:925px;width:540px;height:110px;z-index:70}
.menu-button{left:410px;top:845px;width:100px;height:100px;z-index:75;transition:opacity var(--fade) linear,filter .12s ease,transform .12s ease}
.menu-button.press{filter:brightness(1.25) drop-shadow(0 0 9px rgba(255,215,106,.85));transform:scale(.97)}
.avatar-custom{left:-76.5px;top:230px;width:805px;height:1650px;z-index:20}
.transition-screen{left:0;top:0;width:540px;height:1074px;z-index:65;background:radial-gradient(circle at 50% 42%,rgba(255,214,111,.30),transparent 24%),linear-gradient(135deg,#070b16,#241704 48%,#070b16);display:grid;place-items:center;color:#ffe29a;font-size:24px;font-weight:900;letter-spacing:.08em;text-shadow:0 0 18px rgba(255,205,90,.55)}
.transition-screen::before{content:"MODE CHANGE";padding:18px 26px;border:1px solid rgba(255,224,154,.52);border-radius:16px;background:rgba(4,7,12,.68);box-shadow:0 0 28px rgba(255,200,75,.18)}
.hidden-media{position:absolute;width:1px;height:1px;opacity:.001;pointer-events:none}
@media(prefers-reduced-motion:reduce){.layer{transition:none!important}}
</style>
</head>
<body>
<div id="appViewport"><div id="stage">
  <div id="bgPersonality" class="layer bg personality-bg"></div>
  <iframe id="bgConcierge" class="layer bg" data-src="assets/concierge_bg.html" scrolling="no"></iframe>
  <div id="transitionScreen" class="layer transition-screen"></div>
  <iframe id="avatarCustom" loading="eager" scrolling="no" class="layer avatar-custom" src="assets/avatar_live2d.html"></iframe>
  <iframe id="statusLive" loading="eager" scrolling="no" class="layer status-live" src="assets/status_live_row.html"></iframe>
  <iframe id="bannerRace" loading="eager" scrolling="no" class="layer banner" src="assets/banner_race.html"></iframe>
  <iframe id="bannerAddiction" class="layer banner" data-src="assets/banner_addiction.html" scrolling="no"></iframe>
  <iframe id="voteButton" loading="eager" scrolling="no" class="layer vote-button-layer" src="assets/vote_button.html"></iframe>
  <iframe id="chatBot" class="layer chat" data-src="assets/chat.html" scrolling="no"></iframe>
  <iframe id="commentStream" loading="eager" scrolling="no" class="layer comment-stream" src="assets/comment_stream.html"></iframe>
  <iframe id="sharedInput" loading="eager" scrolling="no" class="layer input" src="assets/shared_input.html"></iframe>
  <iframe id="personalityButton" loading="eager" scrolling="no" class="layer menu-button" src="assets/personality_button.html"></iframe>
  <iframe id="conciergeButton" class="layer menu-button" data-src="assets/concierge_button.html" scrolling="no"></iframe>
  <audio id="bgm" class="hidden-media" src="assets/bgm_demo.m4a" preload="metadata" playsinline></audio>
  <audio id="voiceRace" class="hidden-media" src="assets/voice_race.m4a" preload="metadata" playsinline></audio>
  <audio id="voiceAddiction" class="hidden-media" data-src="assets/voice_addiction.m4a" preload="none" playsinline></audio>
</div></div>
<zenrace-bottom-nav active="onair"></zenrace-bottom-nav>
<script src="../shared/bottom-nav.js?v=19"></script>
<script>
const CONFIG={width:540,height:1074,bgmVolume:.18,voiceVolume:1,tConcierge:60,tPersonality2Return:140,tPersonality2End:165,tPersonality:165,tEnd:236,transitionDuration:3,preSwitchFlash:.3};
const $=id=>document.getElementById(id);
const layers={bgPersonality:$("bgPersonality"),bgConcierge:$("bgConcierge"),transitionScreen:$("transitionScreen"),statusLive:$("statusLive"),bannerRace:$("bannerRace"),bannerAddiction:$("bannerAddiction"),voteButton:$("voteButton"),chatBot:$("chatBot"),commentStream:$("commentStream"),sharedInput:$("sharedInput"),personalityButton:$("personalityButton"),conciergeButton:$("conciergeButton"),avatarCustom:$("avatarCustom")};
const bgm=$("bgm"),voiceRace=$("voiceRace"),voiceAddiction=$("voiceAddiction");
bgm.volume=CONFIG.bgmVolume;voiceRace.volume=CONFIG.voiceVolume;voiceAddiction.volume=CONFIG.voiceVolume;
let startTime=null,raceVoiceStarted=false,addictionVoiceStarted=false,finished=false,currentScene="",previousScene="",conciergeChatStarted=false,voiceLevelSmooth=0,conciergeAvatarSpeaking=false,conciergeAvatarLevel=0,conciergeAvatarSpeakingAt=0,conciergeReleased=false,raceReleased=false;
let contentZoom=1,pinchActive=false,pinchStartDistance=0,pinchStartZoom=1;
const clamp=(value,min,max)=>Math.min(max,Math.max(min,value));
const pinchDistance=touches=>Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY);
function ensureLoaded(el){if(!el||el.dataset.loaded==="1")return;const src=el.dataset.src;if(src){el.src=src;el.dataset.loaded="1"}}
function releaseFrame(el){if(!el)return;try{el.src="about:blank";delete el.dataset.loaded}catch(e){}}
function warmConcierge(){ensureLoaded(layers.bgConcierge);ensureLoaded(layers.chatBot);ensureLoaded(layers.conciergeButton)}
function warmFinal(){ensureLoaded(layers.bannerAddiction);if(!voiceAddiction.src&&voiceAddiction.dataset.src)voiceAddiction.src=voiceAddiction.dataset.src}
function setVisible(el,v){if(el)el.classList.toggle("show",!!v)}
function flashButton(el){if(!el)return;el.classList.remove("press");void el.offsetWidth;el.classList.add("press");setTimeout(()=>el.classList.remove("press"),300)}
function getScene(t){const d=CONFIG.transitionDuration;if(t<CONFIG.tConcierge)return"personality2";if(t<CONFIG.tConcierge+d)return"transitionToConcierge";if(t<CONFIG.tPersonality2Return)return"concierge";if(t<CONFIG.tPersonality2Return+d)return"transitionToPersonality";if(t<CONFIG.tPersonality2End)return"personality2";return"personality"}
function restartConciergeChat(){ensureLoaded(layers.chatBot);conciergeAvatarSpeaking=false;conciergeAvatarLevel=0;conciergeAvatarSpeakingAt=0;layers.chatBot.src=`assets/chat.html?start=${Date.now()}`;try{layers.sharedInput.contentWindow.postMessage({type:"clearChatInput"},"*")}catch(e){}}
function applyScene(scene){if(scene===currentScene)return;previousScene=currentScene;currentScene=scene;const p2=scene==="personality2",p=scene==="personality",c=scene==="concierge",tr=scene.startsWith("transition"),any=p2||p;setVisible(layers.bgPersonality,any);setVisible(layers.bgConcierge,c);setVisible(layers.transitionScreen,tr);setVisible(layers.statusLive,any);setVisible(layers.bannerRace,p2);setVisible(layers.bannerAddiction,p);setVisible(layers.voteButton,any);setVisible(layers.chatBot,c);setVisible(layers.commentStream,any);setVisible(layers.sharedInput,any||c);setVisible(layers.personalityButton,any);setVisible(layers.conciergeButton,c);setVisible(layers.avatarCustom,any||c);try{layers.sharedInput.contentWindow.postMessage({type:"setInputMode",mode:any?"personality":"concierge",text:any?"コメントを入力…":"チャットを入力..."},"*")}catch(e){}if(previousScene&&previousScene!==scene){const fromP=previousScene==="personality2"||previousScene==="personality";if(fromP&&c)flashButton(layers.conciergeButton);if(previousScene==="concierge"&&any)flashButton(layers.personalityButton)}if(c&&!conciergeChatStarted){conciergeChatStarted=true;restartConciergeChat()}}
window.addEventListener("message",e=>{const d=e.data||{};if(d.type==="conciergeAvatarSpeaking"){conciergeAvatarSpeaking=!!d.speaking;conciergeAvatarLevel=conciergeAvatarSpeaking?Math.max(0,Math.min(1,Number(d.level)||.82)):0;if(conciergeAvatarSpeaking)conciergeAvatarSpeakingAt=performance.now()}});
function activeVoiceLevel(){const active=[voiceRace,voiceAddiction].some(a=>a&&!a.paused&&!a.ended);const target=active?.045:0;voiceLevelSmooth=voiceLevelSmooth*.72+target*.28;return voiceLevelSmooth}
let lastAvatar=0;function updateAvatar(scene,now){if(now-lastAvatar<100)return;lastAvatar=now;const pv=scene==="personality2"||scene==="personality",cv=scene==="concierge",level=activeVoiceLevel(),ps=pv&&level>.014,cs=cv&&(conciergeAvatarSpeaking||now-conciergeAvatarSpeakingAt<450);try{layers.avatarCustom.contentWindow.postMessage({type:"avatarState",scene,speaking:ps||cs,level:ps?Math.min(1,level*12):(cs?Math.max(.68,conciergeAvatarLevel||.82):0)},"*")}catch(e){}}
async function startPlayback(){if(startTime!==null)return;startTime=performance.now();applyScene("personality2");requestAnimationFrame(tick);bgm.currentTime=0;bgm.play().catch(()=>{})}
function unlockAudio(){if(startTime===null)return;const t=Math.max(0,(performance.now()-startTime)/1000);if(bgm.paused){try{bgm.currentTime=Math.min(t,bgm.duration||t)}catch(e){}bgm.play().catch(()=>{})}if(t<CONFIG.tConcierge&&voiceRace.paused){try{voiceRace.currentTime=Math.min(t,Math.max(0,(voiceRace.duration||t)-.05))}catch(e){}voiceRace.play().catch(()=>{})}if(t>=CONFIG.tPersonality&&t<CONFIG.tEnd){warmFinal();if(voiceAddiction.paused){try{voiceAddiction.currentTime=Math.min(t-CONFIG.tPersonality,Math.max(0,(voiceAddiction.duration||t)-.05))}catch(e){}voiceAddiction.play().catch(()=>{})}}}
["pointerdown","touchstart","click"].forEach(type=>window.addEventListener(type,unlockAudio,{once:true,passive:true}));
let flashC=false,flashP=false;function tick(now){if(startTime===null)return;const t=(now-startTime)/1000;if(t>54)warmConcierge();if(t>156)warmFinal();const scene=getScene(t);applyScene(scene);if(!flashC&&t>=CONFIG.tConcierge-CONFIG.preSwitchFlash&&t<CONFIG.tConcierge){flashC=true;flashButton(layers.personalityButton)}if(!flashP&&t>=CONFIG.tPersonality2Return-CONFIG.preSwitchFlash&&t<CONFIG.tPersonality2Return){flashP=true;flashButton(layers.conciergeButton)}updateAvatar(scene,now);if(!raceVoiceStarted){raceVoiceStarted=true;voiceRace.currentTime=0;voiceRace.play().catch(()=>{})}if(!addictionVoiceStarted&&t>=CONFIG.tPersonality){addictionVoiceStarted=true;warmFinal();voiceAddiction.currentTime=0;voiceAddiction.play().catch(()=>{})}if(!conciergeReleased&&t>146){conciergeReleased=true;setTimeout(()=>{releaseFrame(layers.bgConcierge);releaseFrame(layers.chatBot);releaseFrame(layers.conciergeButton)},500)}if(!raceReleased&&t>167){raceReleased=true;setTimeout(()=>releaseFrame(layers.bannerRace),500)}if(!finished&&t>=CONFIG.tEnd){finished=true;[bgm,voiceRace,voiceAddiction].forEach(a=>{try{a.pause();a.removeAttribute("src");a.load()}catch(e){}});try{layers.avatarCustom.contentWindow.postMessage({type:"freezeAvatar"},"*")}catch(e){}window.__AITUBER_DONE__=true}if(!finished)requestAnimationFrame(tick)}
function syncViewport(){const root=document.documentElement,vv=window.visualViewport,layout=Math.max(root.clientHeight,window.innerHeight||0),top=vv?Math.max(0,vv.offsetTop):0,visible=vv?vv.height:(window.innerHeight||layout),bottom=vv?Math.max(0,layout-visible-top):0;root.style.setProperty("--visual-top",`${Math.round(top)}px`);root.style.setProperty("--visual-bottom",`${Math.round(bottom)}px`);const vp=$("appViewport"),stage=$("stage");if(!vp||!stage)return;const baseScale=Math.min(vp.clientWidth/CONFIG.width,vp.clientHeight/CONFIG.height);const scale=baseScale*contentZoom;stage.style.transformOrigin="50% 50%";stage.style.transform=`scale(${scale})`;stage.style.left=`${(vp.clientWidth-CONFIG.width)/2}px`;stage.style.top=`${(vp.clientHeight-CONFIG.height)/2}px`}
const appViewport=$("appViewport");
for(const type of ["gesturestart","gesturechange","gestureend"]){document.addEventListener(type,event=>event.preventDefault(),{passive:false})}
appViewport.addEventListener("touchstart",event=>{if(event.touches.length!==2)return;pinchActive=true;pinchStartDistance=pinchDistance(event.touches);pinchStartZoom=contentZoom},{passive:true});
appViewport.addEventListener("touchmove",event=>{if(!pinchActive||event.touches.length!==2)return;event.preventDefault();contentZoom=clamp(pinchStartZoom*pinchDistance(event.touches)/Math.max(1,pinchStartDistance),.82,1.65);syncViewport()},{passive:false});
appViewport.addEventListener("touchend",event=>{if(event.touches.length<2)pinchActive=false},{passive:true});
appViewport.addEventListener("touchcancel",()=>{pinchActive=false},{passive:true});
window.addEventListener("load",()=>{syncViewport();setTimeout(startPlayback,160)});document.addEventListener("visibilitychange",()=>{if(document.hidden){[bgm,voiceRace,voiceAddiction].forEach(a=>{try{a.pause()}catch(e){}})}else if(startTime!==null&&!finished)unlockAudio()},{passive:true});window.addEventListener("resize",syncViewport,{passive:true});window.addEventListener("orientationchange",()=>setTimeout(syncViewport,100),{passive:true});if(window.visualViewport){visualViewport.addEventListener("resize",syncViewport,{passive:true});visualViewport.addEventListener("scroll",syncViewport,{passive:true})}
</script>
</body></html>
