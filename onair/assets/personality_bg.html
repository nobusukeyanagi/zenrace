<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>パーソナリティ背景</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 2347px;
    overflow: hidden;
    background: #020817;
  }
  .bg {
    position: relative;
    width: 1080px;
    height: 2347px;
    overflow: hidden;
    background-image: url("./personality_bg.png");
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 18%, rgba(4,10,30,.16), transparent 34%),
      linear-gradient(180deg, rgba(0,0,0,.08), transparent 45%, rgba(0,0,0,.10));
    mix-blend-mode: multiply;
  }
</style>
</head>
<body>
  <div class="bg" aria-label="race track background"></div>
</body>
</html>
