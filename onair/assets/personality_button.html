<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=200, initial-scale=1" />
  <title>パーソナリティ ボタン（金色ピクトグラム）</title>
  <style>
    :root {
      --w: 200px;
      --h: 200px;
      --base-1: #1a0f04;
      --base-2: #4a2b0b;
      --base-3: #0b0501;
      --gold: #ffd76a;
      --gold-deep: #b97a1d;
      --gold-soft: rgba(255, 215, 106, .22);
      --white: #fff7df;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent;
      font-family: sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .button {
      position: relative;
      width: 200px;
      height: 200px;
      overflow: hidden;
      border-radius: 34px;
      background:
        radial-gradient(circle at 78% 16%, rgba(255, 215, 106, .34) 0%, transparent 30%),
        radial-gradient(circle at 18% 84%, rgba(255, 170, 64, .18) 0%, transparent 30%),
        linear-gradient(145deg, var(--base-1) 0%, var(--base-2) 48%, var(--base-3) 100%);
      border: 2px solid rgba(255, 215, 106, .78);
      box-shadow:
        0 16px 30px rgba(0,0,0,.38),
        0 0 22px rgba(255, 190, 78, .18),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .button::before {
      content: "";
      position: absolute;
      right: -48px;
      top: -48px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 18px solid rgba(255, 215, 106, .10);
    }

    .button::after {
      content: "";
      position: absolute;
      left: -42px;
      bottom: -54px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 188, 80, .20), transparent 68%);
    }

    .status-dot {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(255,215,106,.95);
      z-index: 3;
    }

    .icon-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 154px;
      height: 154px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,215,106,.18), rgba(255,215,106,.07) 58%, rgba(255,215,106,.03) 100%);
      border: 2px solid rgba(255,215,106,.54);
      box-shadow:
        0 0 26px rgba(255,190,78,.20),
        inset 0 1px 0 rgba(255,255,255,.10);
      z-index: 2;
    }

    .personality-icon {
      width: 122px;
      height: 122px;
      color: var(--white);
      filter:
        drop-shadow(0 4px 8px rgba(0,0,0,.44))
        drop-shadow(0 0 6px rgba(255,215,106,.18));
    }
  
    .button::before,
    .button::after,
    .status-dot {
      display: none !important;
    }

    .icon-wrap {
      width: 184px !important;
      height: 184px !important;
      border-radius: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    .personality-icon {
      width: 174px !important;
      height: 174px !important;
    }

    .concierge-icon {
      width: 164px !important;
      height: 164px !important;
    }
  </style>

<link rel="stylesheet" href="./mobile-half.css">
</head>
<body>
  <div class="button" aria-label="現在はパーソナリティ">
    <div class="status-dot"></div>

    <div class="icon-wrap">
      <svg class="personality-icon" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="34" y="12" width="28" height="44" rx="14"
              stroke="currentColor" stroke-width="7" stroke-linejoin="round"/>
        <path d="M24 43V49C24 62.25 34.75 73 48 73C61.25 73 72 62.25 72 49V43"
              stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
        <path d="M48 73V86"
              stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
        <path d="M35 86H61"
              stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
        <path d="M18 12L20.2 17.2L25.4 19.5L20.2 21.8L18 27L15.8 21.8L10.6 19.5L15.8 17.2L18 12Z"
              fill="currentColor" opacity=".72"/>
        <path d="M76 14L77.8 18.1L82 20L77.8 21.9L76 26L74.2 21.9L70 20L74.2 18.1L76 14Z"
              fill="currentColor" opacity=".55"/>
      </svg>
    </div>
  </div>
</body>
</html>
