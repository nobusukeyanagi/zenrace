<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=200, initial-scale=1" />
  <title>コンシェルジュ ボタン（金色ピクトグラム）</title>
  <style>
    :root {
      --w: 200px;
      --h: 200px;
      --base-1: #1a0f04;
      --base-2: #4a2b0b;
      --base-3: #0b0501;
      --gold: #ffd76a;
      --gold-deep: #b97a1d;
      --gold-soft: rgba(255, 215, 106, .22);
      --white: #fff7df;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent;
      font-family: sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .button {
      position: relative;
      width: 200px;
      height: 200px;
      overflow: hidden;
      border-radius: 34px;
      background:
        radial-gradient(circle at 78% 16%, rgba(255, 215, 106, .34) 0%, transparent 30%),
        radial-gradient(circle at 18% 84%, rgba(255, 170, 64, .18) 0%, transparent 30%),
        linear-gradient(145deg, var(--base-1) 0%, var(--base-2) 48%, var(--base-3) 100%);
      border: 2px solid rgba(255, 215, 106, .78);
      box-shadow:
        0 16px 30px rgba(0,0,0,.38),
        0 0 22px rgba(255, 190, 78, .18),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .button::before {
      content: "";
      position: absolute;
      right: -48px;
      top: -48px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 18px solid rgba(255, 215, 106, .10);
    }

    .button::after {
      content: "";
      position: absolute;
      left: -42px;
      bottom: -54px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 188, 80, .20), transparent 68%);
    }

    .status-dot {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(255,215,106,.95);
      z-index: 3;
    }

    .icon-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 154px;
      height: 154px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,215,106,.18), rgba(255,215,106,.07) 58%, rgba(255,215,106,.03) 100%);
      border: 2px solid rgba(255,215,106,.54);
      box-shadow:
        0 0 26px rgba(255,190,78,.20),
        inset 0 1px 0 rgba(255,255,255,.10);
      z-index: 2;
    }

    .concierge-icon {
      width: 122px;
      height: 122px;
      color: var(--white);
      filter:
        drop-shadow(0 4px 8px rgba(0,0,0,.44))
        drop-shadow(0 0 6px rgba(255,215,106,.18));
    }
  
    .button::before,
    .button::after,
    .status-dot {
      display: none !important;
    }

    .icon-wrap {
      width: 184px !important;
      height: 184px !important;
      border-radius: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    .personality-icon,
    .concierge-icon {
      width: 164px !important;
      height: 164px !important;
    }
  </style>
</head>
<body>
  <div class="button" aria-label="現在はコンシェルジュ">
    <div class="status-dot"></div>

    <div class="icon-wrap">
      <svg class="concierge-icon" viewBox="0 0 74 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- service bell -->
        <path d="M14 43C14 29.75 24.75 19 38 19C51.25 19 62 29.75 62 43"
              stroke="currentColor" stroke-width="4.8" stroke-linecap="round"/>
        <path d="M10 43H66"
              stroke="currentColor" stroke-width="4.8" stroke-linecap="round"/>
        <path d="M18 51H58"
              stroke="currentColor" stroke-width="4.8" stroke-linecap="round"/>
        <circle cx="38" cy="14.5" r="4.3" fill="currentColor"/>

        <!-- small sparkle for concierge feel -->
        <path d="M8 8L10 12.2L14.2 14L10 15.8L8 20L6 15.8L1.8 14L6 12.2L8 8Z"
              fill="currentColor" opacity=".70"/>
        <path d="M68 5L69.5 8.1L72.8 9.6L69.5 11.1L68 14.4L66.5 11.1L63.2 9.6L66.5 8.1L68 5Z"
              fill="currentColor" opacity=".50"/>
      </svg>
    </div>
  </div>
</body>
</html>
