<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --base-1: #1a0f04;
    --base-2: #4a2b0b;
    --base-3: #0b0501;
    --white: #ffffff;
    --gold: #ffd76a;
    --gold-1: #f7cf58;
    --gold-2: #d5a628;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
  }

  .wrap {
    width: 100%;
    height: 100%;
    padding: 0;
  }

  a.vote-button {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    height: 100%;
    border-radius: 36px;
    padding: 20px 18px 18px;
    color: var(--white);
    text-decoration: none;
    text-align: center;
    background:
      radial-gradient(circle at 78% 16%, rgba(255, 215, 106, .34) 0%, transparent 30%),
      radial-gradient(circle at 18% 84%, rgba(255, 170, 64, .18) 0%, transparent 30%),
      linear-gradient(145deg, var(--base-1) 0%, var(--base-2) 48%, var(--base-3) 100%);
    border: 2px solid rgba(255, 215, 106, .78);
    box-shadow:
      0 16px 30px rgba(0,0,0,.38),
      0 0 22px rgba(255, 190, 78, .18),
      inset 0 1px 0 rgba(255,255,255,.18);
    overflow: hidden;
  }

  a.vote-button::before {
    content: "";
    position: absolute;
    right: -48px;
    top: -48px;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 18px solid rgba(255, 215, 106, .10);
    pointer-events: none;
  }

  a.vote-button::after {
    content: "";
    position: absolute;
    left: -42px;
    bottom: -54px;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 188, 80, .20), transparent 68%);
    pointer-events: none;
  }

  .line1,
  .line2,
  .line3,
  .line4 {
    position: relative;
    width: 100%;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .line1 {
    font-size: 52px;
    line-height: 1.0;
    font-weight: 1000;
    letter-spacing: .01em;
    text-shadow:
      0 2px 10px rgba(0,0,0,.22),
      0 0 14px rgba(255,255,255,.10);
  }

  .line2 {
    line-height: 1.1;
    font-weight: 1000;
    color: rgba(255,255,255,.95);
    white-space: nowrap;
  }

  .deadline-time {
    font-size: 52px;
    line-height: 1;
  }

  .deadline-label {
    margin-left: 6px;
    font-size: 26px;
    line-height: 1;
    transform: translateY(4px);
  }

  .line3 {
    gap: 12px;
    margin-top: 2px;
  }

  .icon-badge {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    box-shadow:
      0 6px 14px rgba(0,0,0,.22),
      inset 0 1px 0 rgba(255,255,255,.18);
  }

  .icon-badge svg {
    width: 40px;
    height: 40px;
    display: block;
  }

  .icon-badge.auto {
    background: #7a4cff;
  }

  .icon-badge.sg {
    background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
  }

  .icon-badge.sg span {
    color: #fff;
    font-size: 18px;
    font-weight: 1000;
    letter-spacing: .02em;
    line-height: 1;
    font-family: Arial, sans-serif;
  }

  .line4 {
    margin-top: 2px;
  }

  .vote-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 176px;
    height: 70px;
    padding: 0 22px;
    border-radius: 999px;
    border: 2px solid rgba(255, 215, 106, .86);
    color: rgba(255,255,255,.98);
    font-size: 52px;
    font-weight: 1000;
    letter-spacing: .08em;
    background: rgba(255, 215, 106, .10);
    box-shadow:
      0 4px 10px rgba(0,0,0,.18),
      inset 0 1px 0 rgba(255,255,255,.16);
  }
</style>

<link rel="stylesheet" href="./mobile-half.css">
</head>
<body>
  <div class="wrap">
    <a class="vote-button" href="https://www.autorace.jp/netstadium/" target="_blank" rel="noopener noreferrer" aria-label="投票ページへ">
      <div class="line1">浜松12R</div>
      <div class="line2"><span class="deadline-time">16:40</span><span class="deadline-label">締切</span></div>
      <div class="line3">
        <span class="icon-badge auto" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="44" r="10" fill="none" stroke="#ffffff" stroke-width="5"/>
            <circle cx="46" cy="44" r="10" fill="none" stroke="#ffffff" stroke-width="5"/>
            <path d="M18 44L29 28L37 44H25L18 44Z" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M29 28H42L46 44" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="33" cy="16" r="5" fill="#ffffff"/>
            <path d="M32 22L26 31" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
            <path d="M33 22L42 26" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="icon-badge sg" aria-hidden="true"><span>SG</span></span>
      </div>
      <div class="line4">
        <span class="vote-pill">投票</span>
      </div>
    </a>
  </div>
</body>
</html>
