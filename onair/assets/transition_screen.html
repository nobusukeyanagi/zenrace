<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>モード切替中</title>
<style>
:root {
  --w: 1080px;
  --h: 2347px;
  --gold: #ffd76a;
  --gold2: #fff0b8;
  --dark: #050505;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: var(--w);
  height: var(--h);
  overflow: hidden;
  background: #000;
  font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
}
body { pointer-events: none; }
.stage {
  position: relative;
  width: var(--w);
  height: var(--h);
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 48%, rgba(255,215,106,.20), transparent 22%),
    radial-gradient(circle at 18% 80%, rgba(255,215,106,.10), transparent 24%),
    radial-gradient(circle at 86% 18%, rgba(255,255,255,.07), transparent 18%),
    linear-gradient(180deg, #020202 0%, #0a0a0a 42%, #050505 100%);
}
.stage::before {
  content: "";
  position: absolute;
  inset: -260px;
  background:
    conic-gradient(from 0deg at 50% 50%,
      transparent 0deg,
      rgba(255,215,106,.07) 45deg,
      transparent 88deg,
      rgba(255,255,255,.045) 136deg,
      transparent 188deg,
      rgba(255,215,106,.08) 242deg,
      transparent 308deg,
      rgba(255,255,255,.035) 360deg);
  animation: rotateBg 9s linear infinite;
  filter: blur(10px);
}
.stage::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 50%, transparent 0%, transparent 58%, rgba(0,0,0,.46) 100%),
    repeating-linear-gradient(90deg, rgba(255,255,255,.014) 0 1px, transparent 1px 40px);
  opacity: .65;
}
.panel {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 900px;
  height: 520px;
  transform: translate(-50%, -50%);
  display: grid;
  place-items: center;
  z-index: 2;
}
.ring {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 520px;
  height: 520px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 3px solid rgba(255,215,106,.16);
  box-shadow:
    0 0 44px rgba(255,215,106,.18),
    inset 0 0 36px rgba(255,215,106,.08);
  animation: pulse 1.35s ease-in-out infinite;
}
.ring::before,
.ring::after {
  content: "";
  position: absolute;
  inset: 42px;
  border-radius: 50%;
  border: 4px solid transparent;
  border-top-color: var(--gold);
  border-right-color: rgba(255,215,106,.32);
  animation: spin 1.1s linear infinite;
}
.ring::after {
  inset: 104px;
  border-top-color: rgba(255,255,255,.78);
  border-right-color: rgba(255,215,106,.18);
  animation-duration: 1.65s;
  animation-direction: reverse;
}
.copy {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 940px;
  transform: translate(-50%, -50%);
  text-align: center;
  display: grid;
  place-items: center;
}
.title {
  width: 100%;
  display: block;
  text-align: center;
  color: #fff;
  font-size: 68px;
  font-weight: 1000;
  line-height: 1;
  letter-spacing: .08em;
  text-shadow:
    0 4px 16px rgba(0,0,0,.75),
    0 0 24px rgba(255,215,106,.22);
}
.dots {
  display: none;
}
.dots span {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 16px rgba(255,215,106,.85);
  animation: dot 1.05s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .16s; }
.dots span:nth-child(3) { animation-delay: .32s; }
.sub {
  margin-top: 28px;
  color: rgba(255,240,184,.92);
  font-size: 36px;
  font-weight: 800;
  letter-spacing: .18em;
  text-shadow: 0 2px 10px rgba(0,0,0,.72);
}
.sweep {
  position: absolute;
  left: -35%;
  top: 0;
  width: 30%;
  height: 100%;
  background: linear-gradient(100deg, transparent, rgba(255,255,255,.10), transparent);
  transform: skewX(-18deg);
  animation: sweep 2.2s ease-in-out infinite;
  z-index: 1;
}
@keyframes rotateBg {
  to { transform: rotate(360deg); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .88; }
  50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
}
@keyframes dot {
  0%, 100% { transform: translateY(0); opacity: .45; }
  50% { transform: translateY(-9px); opacity: 1; }
}
@keyframes sweep {
  0% { left: -35%; opacity: 0; }
  20% { opacity: 1; }
  70%, 100% { left: 108%; opacity: 0; }
}
</style>
</head>
<body>
  <main class="stage" aria-label="モード切替中">
    <div class="sweep"></div>
    <section class="panel">
      <div class="ring"></div>
      <div class="copy">
        <div class="title">モード切替中</div>
        <div class="sub">PLEASE WAIT</div>
      </div>
    </section>
  </main>
</body>
</html>
