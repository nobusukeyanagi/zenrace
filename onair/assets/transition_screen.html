<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=540, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>モード切替中</title>
<style>
:root{--w:540px;--h:1074px;--gold:#ffd76a;--gold2:#fff0b8}
*{box-sizing:border-box}
html,body{margin:0;width:var(--w);height:var(--h);overflow:hidden;background:#050505;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif}
body{pointer-events:none}
.stage{position:relative;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 48%,rgba(255,215,106,.20),transparent 22%),radial-gradient(circle at 18% 80%,rgba(255,215,106,.10),transparent 24%),radial-gradient(circle at 86% 18%,rgba(255,255,255,.07),transparent 18%),linear-gradient(180deg,#020202 0%,#0a0a0a 42%,#050505 100%)}
.stage::before{content:"";position:absolute;inset:-130px;background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,rgba(255,215,106,.07) 45deg,transparent 88deg,rgba(255,255,255,.045) 136deg,transparent 188deg,rgba(255,215,106,.08) 242deg,transparent 308deg,rgba(255,255,255,.035) 360deg);animation:rotateBg 9s linear infinite;filter:blur(5px)}
.stage::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,transparent 0%,transparent 58%,rgba(0,0,0,.46) 100%),repeating-linear-gradient(90deg,rgba(255,255,255,.014) 0 1px,transparent 1px 20px);opacity:.65}
.panel{position:absolute;left:50%;top:50%;width:450px;height:260px;transform:translate(-50%,-50%);display:grid;place-items:center;z-index:2}
.ring{position:absolute;left:50%;top:50%;width:260px;height:260px;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(255,215,106,.18);box-shadow:0 0 28px rgba(255,215,106,.20),inset 0 0 20px rgba(255,215,106,.09);animation:pulse 1.35s ease-in-out infinite}
.ring::before,.ring::after{content:"";position:absolute;inset:21px;border-radius:50%;border:3px solid transparent;border-top-color:var(--gold);border-right-color:rgba(255,215,106,.32);animation:spin 1.1s linear infinite}
.ring::after{inset:52px;border-top-color:rgba(255,255,255,.78);border-right-color:rgba(255,215,106,.18);animation-duration:1.65s;animation-direction:reverse}
.copy{position:absolute;left:50%;top:50%;width:470px;transform:translate(-50%,-50%);text-align:center;display:grid;place-items:center}
.title{width:100%;color:#fff;font-size:34px;font-weight:1000;line-height:1;letter-spacing:.08em;text-shadow:0 3px 10px rgba(0,0,0,.78),0 0 16px rgba(255,215,106,.24)}
.sub{margin-top:17px;color:rgba(255,240,184,.92);font-size:18px;font-weight:800;letter-spacing:.18em;text-shadow:0 2px 7px rgba(0,0,0,.72)}
.sweep{position:absolute;left:-35%;top:0;width:30%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.10),transparent);transform:skewX(-18deg);animation:sweep 2.2s ease-in-out infinite;z-index:1}
@keyframes rotateBg{to{transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.88}50%{transform:translate(-50%,-50%) scale(1.05);opacity:1}}
@keyframes sweep{0%{left:-35%;opacity:0}20%{opacity:1}70%,100%{left:108%;opacity:0}}
@media(prefers-reduced-motion:reduce){.stage::before,.ring,.ring::before,.ring::after,.sweep{animation-duration:1.8s}}
</style>
</head>
<body>
<main class="stage" aria-label="モード切替中">
  <div class="sweep"></div>
  <section class="panel">
    <div class="ring"></div>
    <div class="copy"><div class="title">モード切替中</div><div class="sub">PLEASE WAIT</div></div>
  </section>
</main>
</body>
</html>
