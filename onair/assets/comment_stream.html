:root {
  --left: 30px;

  --font-size: 36px;
  --line-height: 1.20;
  --gap: 25px;
  --rows: 12;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: "Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
}
body { pointer-events: none; }
.comment-layer {
  position: fixed;
  left: var(--left);
  bottom: var(--bottom);
  width: var(--width);
  height: var(--height);
  overflow: hidden;
  pointer-events: none;
}
.stack {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: calc((var(--font-size) * var(--line-height) * var(--rows)) + (var(--gap) * (var(--rows) - 1)));
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: var(--gap);
}
.comment {
  width: var(--width);
  color: #fff;
  font-size: var(--font-size);
  font-weight: 900;
  line-height: var(--line-height);
  letter-spacing: .02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow:
    0 2px 3px rgba(0,0,0,.95),
    0 0 7px rgba(0,0,0,.75),
    0 0 1px rgba(0,0,0,1);
  opacity: .96;
  transform: translateY(0);
}
.comment.new {
  animation: popIn .46s ease both;
}
@keyframes popIn {
  0% { transform: translateY(16px); opacity: 0; }
  100% { transform: translateY(0); opacity: .96; }
}
</style>

  });
