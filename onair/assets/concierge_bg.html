<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>Warm Brown Bar Background Shelves</title>
  <style>
    :root {
      --w: 1080px;
      --h: 2347px;
      --black: #050201;
      --brown0: #120704;
      --brown1: #2b1208;
      --brown2: #4c2310;
      --wood: #6c371b;
      --copper: #b96d2f;
      --amber: #f2b66a;
      --gold: #ffd893;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: var(--black);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { pointer-events: none; }

    .bar {
      position: relative;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(255, 207, 124, .25), transparent 24%),
        radial-gradient(circle at 16% 56%, rgba(191, 86, 36, .20), transparent 30%),
        radial-gradient(circle at 84% 54%, rgba(255, 160, 74, .15), transparent 31%),
        linear-gradient(180deg, #050201 0%, #170704 22%, #351708 52%, #130704 78%, #050201 100%);
    }

    .bar::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 34%, rgba(255, 201, 118, .16), transparent 42%),
        linear-gradient(115deg, transparent 0 38%, rgba(255, 235, 190, .045) 46%, transparent 55%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.016) 0 1px, transparent 1px 76px);
      z-index: 8;
    }

    .bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 58%, rgba(0,0,0,.50) 100%),
        linear-gradient(180deg, rgba(0,0,0,.06), transparent 26%, rgba(0,0,0,.40) 100%);
      z-index: 30;
    }

    .back-wall {
      position: absolute;
      left: -80px;
      right: -80px;
      top: 0;
      height: 1450px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.030) 0 1px, transparent 1px 112px),
        repeating-linear-gradient(
          90deg,
          rgba(255, 218, 148, .040) 0px,
          rgba(80, 32, 12, .10) 32px,
          rgba(255, 218, 148, .020) 76px,
          rgba(45, 16, 7, .13) 126px
        ),
        linear-gradient(180deg, #160704 0%, #3a190b 48%, #180704 100%);
      box-shadow:
        inset 0 -120px 150px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.04);
      z-index: 1;
    }

    .bar-shelves {
      position: absolute;
      left: 70px;
      right: 70px;
      top: 255px;
      height: 820px;
      z-index: 5;
      opacity: .84;
    }

    .rack {
      position: absolute;
      left: 0;
      right: 0;
      height: 220px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 226, 164, .095), rgba(255, 226, 164, .022)),
        rgba(40, 15, 7, .42);
      border: 1px solid rgba(255, 224, 160, .13);
      box-shadow:
        0 24px 54px rgba(0,0,0,.26),
        inset 0 1px 0 rgba(255,255,255,.10),
        inset 0 -24px 45px rgba(0,0,0,.30);
      overflow: hidden;
    }

    .rack.r1 { top: 0; }
    .rack.r2 { top: 272px; }
    .rack.r3 { top: 544px; opacity: .78; }

    .rack::before {
      content: "";
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 36px;
      height: 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, #d08a42, #4b1f0c);
      box-shadow:
        0 12px 24px rgba(0,0,0,.36),
        inset 0 1px 0 rgba(255,236,178,.28);
      z-index: 3;
    }

    .rack::after {
      content: "";
      position: absolute;
      left: 36px;
      right: 36px;
      bottom: 18px;
      height: 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.34);
      filter: blur(7px);
      z-index: 2;
    }

    .bottle-row {
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 56px;
      height: 150px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      z-index: 4;
    }

    .bottle {
      position: relative;
      width: 34px;
      border-radius: 11px 11px 7px 7px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.15), transparent 28%, rgba(0,0,0,.20) 70%),
        linear-gradient(180deg, rgba(255,220,145,.55), rgba(148,68,25,.42));
      border: 1px solid rgba(255,224,160,.18);
      box-shadow:
        0 8px 15px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.24);
    }

    .bottle::before {
      content: "";
      position: absolute;
      left: 10px;
      top: -34px;
      width: 14px;
      height: 40px;
      border-radius: 6px 6px 3px 3px;
      background: linear-gradient(180deg, rgba(255,230,160,.42), rgba(115,48,18,.45));
      border: 1px solid rgba(255,224,160,.14);
    }

    .bottle::after {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      top: 46%;
      height: 24px;
      border-radius: 8px;
      background: rgba(255,220,150,.17);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
    }

    .bottle.h1 { height: 88px; }
    .bottle.h2 { height: 116px; }
    .bottle.h3 { height: 72px; }
    .bottle.h4 { height: 132px; }
    .bottle.h5 { height: 104px; }
    .bottle.green {
      background:
        linear-gradient(90deg, rgba(255,255,255,.13), transparent 28%, rgba(0,0,0,.22) 70%),
        linear-gradient(180deg, rgba(196,222,154,.48), rgba(42,88,45,.42));
    }
    .bottle.red {
      background:
        linear-gradient(90deg, rgba(255,255,255,.13), transparent 28%, rgba(0,0,0,.22) 70%),
        linear-gradient(180deg, rgba(255,186,130,.50), rgba(134,42,27,.46));
    }

    .pendant {
      position: absolute;
      top: 0;
      width: 170px;
      height: 420px;
      z-index: 7;
      opacity: .78;
    }

    .pendant.left { left: 142px; }
    .pendant.center { left: 455px; top: -20px; transform: scale(1.08); }
    .pendant.right { right: 142px; }

    .pendant::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 4px;
      height: 230px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(255,235,180,.44), rgba(255,235,180,.04));
    }

    .pendant::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 205px;
      width: 120px;
      height: 54px;
      transform: translateX(-50%);
      border-radius: 0 0 60px 60px;
      background:
        radial-gradient(ellipse at 50% 88%, rgba(255, 220, 150, .70), transparent 46%),
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(120,55,24,.22));
      border: 1px solid rgba(255,220,160,.18);
      box-shadow:
        0 26px 70px rgba(255,160,70,.17),
        inset 0 1px 0 rgba(255,255,255,.22);
    }

    .bar-counter {
      position: absolute;
      left: -120px;
      right: -120px;
      top: 1450px;
      height: 540px;
      transform: skewY(-3deg);
      background:
        linear-gradient(180deg, rgba(255, 210, 130, .22), rgba(78, 29, 10, .74) 25%, rgba(20, 8, 4, .97) 100%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 1px, transparent 1px 110px);
      border-top: 2px solid rgba(255, 220, 156, .24);
      box-shadow:
        0 -38px 95px rgba(255, 154, 64, .11),
        inset 0 1px 0 rgba(255,255,255,.13),
        inset 0 76px 126px rgba(255,176,88,.06);
      z-index: 10;
    }

    .glow {
      position: absolute;
      left: 50%;
      bottom: 120px;
      width: 1180px;
      height: 540px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(255, 162, 74, .15), rgba(115, 45, 14, .10) 40%, transparent 72%);
      filter: blur(22px);
      z-index: 12;
      opacity: .9;
    }
  </style>

<link rel="stylesheet" href="./mobile-half.css">
</head>
<body>
  <main class="bar" aria-hidden="true">
    <div class="back-wall"></div>

    <div class="pendant left"></div>
    <div class="pendant center"></div>
    <div class="pendant right"></div>

    <section class="bar-shelves">
      <div class="rack r1">
        <div class="bottle-row">
          <span class="bottle h1"></span><span class="bottle h2 green"></span><span class="bottle h3 red"></span><span class="bottle h4"></span><span class="bottle h2"></span><span class="bottle h1 green"></span><span class="bottle h3"></span><span class="bottle h4 red"></span><span class="bottle h5"></span><span class="bottle h2 red"></span><span class="bottle h1"></span><span class="bottle h4 green"></span><span class="bottle h3"></span><span class="bottle h5 red"></span><span class="bottle h2"></span>
        </div>
      </div>
      <div class="rack r2">
        <div class="bottle-row">
          <span class="bottle h2 red"></span><span class="bottle h1"></span><span class="bottle h4 green"></span><span class="bottle h3"></span><span class="bottle h2"></span><span class="bottle h4"></span><span class="bottle h1 red"></span><span class="bottle h3 green"></span><span class="bottle h5"></span><span class="bottle h2 green"></span><span class="bottle h4 red"></span><span class="bottle h1"></span><span class="bottle h3"></span><span class="bottle h5 green"></span><span class="bottle h2"></span>
        </div>
      </div>
      <div class="rack r3">
        <div class="bottle-row">
          <span class="bottle h3"></span><span class="bottle h4 red"></span><span class="bottle h2"></span><span class="bottle h1 green"></span><span class="bottle h4"></span><span class="bottle h3 red"></span><span class="bottle h2 green"></span><span class="bottle h1"></span><span class="bottle h5 red"></span><span class="bottle h2"></span><span class="bottle h4 green"></span><span class="bottle h3"></span><span class="bottle h1 red"></span><span class="bottle h5"></span><span class="bottle h2 green"></span>
        </div>
      </div>
    </section>

    <div class="bar-counter"></div>
    <div class="glow"></div>
  </main>
</body>
</html>
