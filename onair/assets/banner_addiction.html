<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>ギャンブル依存症対策啓発バナー</title>
  <style>
    :root {
      --canvas-w: 1080px;
      --canvas-h: 550px;
      --poster-w: 1024px;
      --poster-h: 500px;

      --navy-1: #071426;
      --navy-2: #12325f;
      --yellow: #ffd84d;
      --cyan: #52d9ff;
      --white: #ffffff;
      --soft-white: rgba(255, 255, 255, .96);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--canvas-w);
      height: var(--canvas-h);
      overflow: hidden;
      background: transparent;
      font-family:
        "Noto Sans JP",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .poster {
      position: relative;
      width: var(--poster-w);
      height: var(--poster-h);
      overflow: hidden;
      border-radius: 26px;
      color: var(--white);
      background:
        radial-gradient(circle at 86% 18%, rgba(50, 213, 255, .30) 0%, transparent 24%),
        radial-gradient(circle at 9% 88%, rgba(255, 216, 77, .22) 0%, transparent 28%),
        linear-gradient(135deg, var(--navy-1) 0%, var(--navy-2) 58%, #071426 100%);
      box-shadow:
        0 26px 54px rgba(0, 0, 0, .34),
        0 10px 22px rgba(0, 0, 0, .24),
        inset 0 1px 0 rgba(255, 255, 255, .16);
      border: 1px solid rgba(255, 255, 255, .28);
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: -86px -126px auto auto;
      width: 390px;
      height: 390px;
      border-radius: 50%;
      border: 40px solid rgba(255, 255, 255, .07);
    }

    .poster::after {
      content: "";
      position: absolute;
      left: -120px;
      bottom: -170px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(29, 140, 255, .16);
      filter: blur(4px);
    }

    .layout {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
      padding: 28px 40px 30px;
    }

    .main {
      align-self: center;
      min-width: 0;
      text-align: center;
    }

    .top-label {
      margin: 0;
      color: var(--yellow);
      font-size: 25px;
      font-weight: 1000;
      line-height: 1.12;
      letter-spacing: .03em;
      white-space: nowrap;
      text-align: center;
      text-shadow:
        0 4px 10px rgba(0, 0, 0, .34),
        0 0 16px rgba(82, 217, 255, .14);
    }

    .headline {
      margin: 0;
      color: #ffffff;
      text-align: center;
      text-shadow:
        0 5px 14px rgba(0, 0, 0, .34),
        0 0 20px rgba(82, 217, 255, .18);
    }

    .headline .line1 {
      display: block;
      font-size: 88px;
      font-weight: 1000;
      line-height: 1.00;
      letter-spacing: 0;
      white-space: nowrap;
      text-align: center;
    }

    .headline .line2 {
      display: block;
      font-size: 72px;
      font-weight: 1000;
      line-height: 1.02;
      letter-spacing: 0;
      white-space: nowrap;
      margin-top: 2px;
      text-align: center;
    }

    .headline-line {
      width: 240px;
      height: 5px;
      margin: 14px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--yellow), var(--cyan));
      box-shadow: 0 0 12px rgba(82, 217, 255, .24);
    }

    .lead {
      margin: 24px 0 0;
      color: var(--soft-white);
      font-size: 29px;
      font-weight: 1000;
      line-height: 1.16;
      letter-spacing: -0.035em;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,.24);
    }

    .sublead {
      margin: 14px 0 0;
      color: rgba(255,255,255,.99);
      font-size: 35px;
      font-weight: 1000;
      line-height: 1.14;
      letter-spacing: -0.01em;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,.24);
    }

    .footer-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 14px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .10);
      border: 1px solid rgba(255, 255, 255, .18);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, .18),
        inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      margin-bottom: 8px;
      text-align: center;
    }

    .bottom-line {
      width: 100%;
      margin: 0;
      color: rgba(255, 255, 255, .99);
      font-size: 35px;
      font-weight: 1000;
      line-height: 1.14;
      letter-spacing: -0.01em;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 3px 10px rgba(0,0,0,.26);
    }
  </style>

<link rel="stylesheet" href="./mobile-half.css">
</head>

<body>
  <section class="poster" aria-label="ギャンブル依存症対策啓発バナー">
    <div class="layout">
      <div class="main">
        <div class="headline">
          <span class="line1">オートレースを</span>
          <span class="line2">お楽しみいただくために</span>
        </div>
        <div class="headline-line" aria-hidden="true"></div>
        <p class="lead">予算と時間を決めて、自分に合ったペースで楽しむことが大切です。</p>
        <p class="sublead">無理のない範囲で、健全に楽しみましょう。</p>
      </div>

      <div class="footer-panel">
        <p class="bottom-line">車券の購入は二十歳になってから！</p>
      </div>
    </div>
  </section>
</body>
</html>
