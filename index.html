<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="zenrace">
  <title>ZENRACE</title>
  <link rel="stylesheet" href="./shared/header.css?v=19">
  <link rel="stylesheet" href="./shared/page-shell.css?v=19">
  <style>
    :root{color-scheme:dark;font-family:"Noto Sans JP","Yu Gothic UI","Yu Gothic",sans-serif}
    *{box-sizing:border-box}
    html{background:#030712}
    body{color:#f8fafc;background:radial-gradient(circle at 85% 8%,rgba(212,175,55,.22),transparent 28rem),linear-gradient(145deg,#111827,#030712)}
    main{width:min(calc(100% - 32px),760px);margin:0 auto;padding:38px 0 30px}
    .lead{max-width:36rem;margin:0 0 44px;color:#cbd5e1;line-height:1.8}
    .menu{display:grid;gap:16px}
    .card{display:block;padding:24px;color:inherit;text-decoration:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:20px;box-shadow:0 18px 50px rgba(0,0,0,.28)}
    .eyebrow{display:block;margin-bottom:8px;color:#d4af37;font-size:.78rem;font-weight:700;letter-spacing:.14em}
    .title{display:block;font-size:1.25rem;font-weight:700}
    .description{display:block;margin-top:8px;color:#cbd5e1;line-height:1.7}
    .arrow{display:block;margin-top:20px;font-weight:700}
    footer{margin-top:48px;color:#64748b;font-size:.8rem}
  </style>
  <script src="./shared/fixed-layout.js?v=19" defer></script>
  <script src="./shared/bottom-nav.js?v=28" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="header-side left"></div>
    <div class="header-center"><h1 class="header-title">ZENRACE</h1></div>
    <div class="header-side right"></div>
  </header>

  <div class="zenrace-content-shell" data-zenrace-pinch-shell>
    <div class="zenrace-content-sizer" data-zenrace-pinch-sizer>
      <div class="zenrace-content-stage" data-zenrace-pinch-stage>
        <main>
          <p class="lead">公営競技を、もっと分かりやすく楽しむためのスマートフォンアプリ構想デモです。</p>
          <nav class="menu" aria-label="サービス一覧">
            <a class="card" href="./gradedraces/">
              <span class="eyebrow">GRADED RACES</span>
              <span class="title">公営競技重賞日程</span>
              <span class="description">JRA・地方競馬・ボートレース・競輪・オートレースのグレードレースを一覧表示します。</span>
              <span class="arrow">ページを開く →</span>
            </a>
          </nav>
          <footer>zenrace demo</footer>
        </main>
      </div>
    </div>
  </div>

  <zenrace-bottom-nav active="home"></zenrace-bottom-nav>
</body>
</html>
