<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>zenrace</title>
  <style>
    :root {
      color-scheme: dark;
      font-family:
        "Noto Sans JP",
        "Yu Gothic UI",
        "Yu Gothic",
        sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: #f8fafc;
      background:
        radial-gradient(
          circle at 85% 8%,
          rgba(212, 175, 55, 0.22),
          transparent 28rem
        ),
        linear-gradient(145deg, #111827, #030712);
    }

    main {
      width: min(100% - 28px, 760px);
      margin: 0 auto;
      padding: clamp(42px, 13vw, 72px) 0 28px;
    }

    .brand {
      margin: 0;
      font-size: clamp(2.5rem, 10vw, 5rem);
      line-height: 1;
      letter-spacing: 0.06em;
    }

    .lead {
      max-width: 36rem;
      margin: 20px 0 44px;
      color: #cbd5e1;
      line-height: 1.8;
    }

    .menu {
      display: grid;
      gap: 16px;
    }

    .card {
      display: block;
      padding: 24px;
      color: inherit;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      transition:
        transform 160ms ease,
        border-color 160ms ease,
        background 160ms ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(212, 175, 55, 0.75);
      outline: none;
    }

    .eyebrow {
      display: block;
      margin-bottom: 8px;
      color: #d4af37;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
    }

    .title {
      display: block;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .description {
      display: block;
      margin-top: 8px;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .arrow {
      display: block;
      margin-top: 20px;
      font-weight: 700;
    }

    footer {
      margin-top: 48px;
      color: #64748b;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="brand">zenrace</h1>
    <p class="lead">
      公営競技を、もっと分かりやすく楽しむための
      スマートフォンアプリ構想デモです。
    </p>

    <nav class="menu" aria-label="サービス一覧">
      <a class="card" href="./gradedraces/">
        <span class="eyebrow">GRADED RACES</span>
        <span class="title">公営競技重賞日程</span>
        <span class="description">
          JRA・地方競馬・ボートレース・競輪・
          オートレースのグレードレースを一覧表示します。
        </span>
        <span class="arrow">ページを開く →</span>
      </a>
    </nav>

    <footer>zenrace demo</footer>
  </main>

  <zenrace-bottom-nav active="home"></zenrace-bottom-nav>
  <script src="./shared/bottom-nav.js" defer></script>
</body>
</html>
