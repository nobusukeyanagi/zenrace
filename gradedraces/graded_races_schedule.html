<style>
:root{
  --nav-content-h:62px;
  --nav-safe:max(env(safe-area-inset-bottom),0px);
  --nav-total-h:calc(var(--nav-content-h) + var(--nav-safe));
  --visual-bottom:0px;
  --visual-height:100dvh;
  --bg:#eef1f5;--panel:#fff;--line:#d8dde6;--text:#18202a;--muted:#738091;
  --jra:#23834a;--nar:#8b5a2b;--boat:#1876c9;--keirin:#d8661d;--auto:#7545af;
  --sat:#eaf4ff;--sun:#fff0f0;--today:#fff6c8;
  --content-scale:1.18;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;min-height:100%;margin:0;overflow:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%}
html{background:#090909}
body{position:fixed;inset:0;height:var(--visual-height);min-height:0}
body{
  color:var(--text);background:linear-gradient(180deg,#f8fafc,var(--bg));
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  overscroll-behavior:none;
}
button,textarea{font:inherit}
button{-webkit-tap-highlight-color:transparent}

.month-nav{display:grid;grid-template-columns:34px minmax(112px,auto) 34px;align-items:center;gap:2px}
.month-arrow{width:34px;height:34px;border:0;background:transparent;color:var(--header-gold-light);font-size:27px;line-height:1;cursor:pointer}
.month-title{text-align:center;color:#fff;font-size:17px;font-weight:900;letter-spacing:.045em;white-space:nowrap;text-shadow:0 1px 8px rgba(0,0,0,.28)}

zenrace-bottom-nav{touch-action:none;overscroll-behavior:none}

.content-shell{
  position:fixed;left:0;right:0;top:calc(var(--visual-top) + var(--header-h) + env(safe-area-inset-top));bottom:calc(var(--visual-bottom) + var(--nav-total-h));
  overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:none;background:linear-gradient(180deg,#f6f8fb,#e9edf3);
  touch-action:pan-y;
}
.zoom-sizer{position:relative;min-width:100%;height:100%;min-height:100%}
.zoom-stage{
  position:absolute;left:0;top:0;transform:scale(var(--content-scale));transform-origin:0 0;
  width:520px;height:max-content;min-height:0;will-change:transform
}
.schedule{padding:7px 8px 6px}
.day-block{
  display:grid;grid-template-columns:38px minmax(0,1fr);margin-bottom:3px;overflow:hidden;
  border:1px solid var(--line);border-radius:7px;background:var(--panel);box-shadow:0 1px 4px rgba(15,23,42,.045)
}
.day-block.today{border-color:#d2a52e;box-shadow:0 0 0 1px rgba(210,165,46,.17)}
.date-cell{
  display:flex;align-items:center;justify-content:center;gap:2px;min-height:30px;padding:1px 2px;
  border-right:1px solid var(--line);background:#f8fafc;white-space:nowrap
}
.day-block.sat .date-cell{background:var(--sat)}
.day-block.sun .date-cell,.day-block.holiday .date-cell{background:var(--sun)}
.day-block.today .date-cell{background:var(--today)}
.date-number{font-size:17px;line-height:1;font-weight:950;letter-spacing:-.04em}
.weekday{font-size:7px;line-height:1;font-weight:900;color:var(--muted)}
.day-block.sat .date-number,.day-block.sat .weekday{color:#1769aa}
.day-block.sun .date-number,.day-block.sun .weekday,.day-block.holiday .date-number,.day-block.holiday .weekday{color:#c23d3d}
.race-list{min-width:0}
.race-row{
  --sport:#555;display:grid;grid-template-columns:43px 27px 46px 43px minmax(195px,1fr) 103px;
  align-items:stretch;min-width:457px;min-height:30px;border-bottom:1px solid #e8ebf0;font-size:10.5px
}
.race-row:last-child{border-bottom:0}.race-row:hover{background:#f8fafc}
.race-row.jra{--sport:var(--jra)}.race-row.nar{--sport:var(--nar)}.race-row.boat{--sport:var(--boat)}
.race-row.keirin{--sport:var(--keirin)}.race-row.auto{--sport:var(--auto)}
.cell{min-width:0;display:flex;align-items:center;padding:3px 5px;line-height:1.15;white-space:nowrap}
.time-cell{justify-content:center;border-right:1px solid #edf0f4;font-variant-numeric:tabular-nums;font-weight:850}
.time-cell.pending{color:#9aa3af;font-size:9px}.time-cell.cancelled{color:#c43b3b;font-weight:950}
.sport-cell{justify-content:center;padding:2px 1px}
.sport-badge{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;background:var(--sport);box-shadow:inset 0 0 0 1px rgba(255,255,255,.14),0 1px 2px rgba(0,0,0,.08)}
.sport-icon-image{display:block;width:21px;height:21px;object-fit:contain;object-position:center;filter:brightness(0) invert(1);-webkit-filter:brightness(0) invert(1);pointer-events:none;user-select:none;-webkit-user-drag:none}
.venue-cell{justify-content:center;border-left:1px solid #edf0f4;border-right:1px solid #edf0f4;font-weight:900;letter-spacing:-.03em;overflow:hidden;text-overflow:clip}
.grade-cell{justify-content:center;border-right:1px solid #edf0f4;font-weight:850;overflow:hidden}
.name-cell{font-weight:800;overflow:hidden;position:relative}
.name-cell .race-name-text{display:inline-block;min-width:max-content;white-space:nowrap;will-change:transform}
.name-cell.scrolling .race-name-text{animation:race-name-pan var(--marquee-duration,12s) ease-in-out infinite alternate}
@keyframes race-name-pan{0%,18%{transform:translateX(0)}82%,100%{transform:translateX(calc(-1 * var(--marquee-distance,0px)))}}
.winner-cell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.winner-cell{justify-content:center;border-left:1px solid #edf0f4;font-weight:800;overflow:hidden}
.grade-top,.name-top{color:#c62828}
.empty-month,.loading-state{margin:12px;padding:44px 20px;border:1px dashed #c7ced8;border-radius:11px;background:rgba(255,255,255,.74);color:#8792a0;text-align:center;font-size:12px}

.modal-backdrop{position:fixed;inset:0;z-index:3000;display:none;place-items:center;padding:16px;background:rgba(6,9,14,.72);backdrop-filter:blur(5px)}
.modal-backdrop.open{display:grid}.modal{width:min(900px,96vw);max-height:88dvh;display:grid;grid-template-rows:auto auto minmax(230px,1fr) auto auto;gap:9px;padding:15px;border-radius:14px;background:#fff;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.modal-head,.modal-actions{display:flex;align-items:center;justify-content:space-between;gap:10px}.modal h2{margin:0;font-size:17px}.help{margin:0;color:#6f7a8b;font-size:10px;line-height:1.6}
#jsonEditor{width:100%;min-height:270px;resize:vertical;padding:11px;border:1px solid #cfd6df;border-radius:9px;background:#f8fafc;font:10px/1.5 Consolas,monospace}
.modal-btn{border:1px solid #c9d1dc;border-radius:8px;padding:7px 10px;color:#243041;background:#fff;font-weight:750;cursor:pointer}.modal-btn.primary{color:#fff;border-color:#171d25;background:#171d25}.modal-actions>div{display:flex;gap:6px}.error{min-height:15px;color:#c93636;font-size:10px;font-weight:850}

@media(max-width:430px){
  :root{--nav-content-h:62px}
  .month-nav{grid-template-columns:29px minmax(102px,auto) 29px}.month-arrow{width:29px}.month-title{font-size:15px}
  .schedule{padding:5px 5px 5px}.day-block{grid-template-columns:36px minmax(0,1fr)}
  .date-number{font-size:16px}.weekday{font-size:6.5px}
}
@media(display-mode:standalone){
  :root{--nav-content-h:58px}
}
@media print{
  html,body{height:auto;overflow:visible}.topbar,zenrace-bottom-nav,.modal-backdrop{display:none!important}
  .content-shell{position:static;overflow:visible}.zoom-sizer{min-height:0!important;width:auto!important;height:auto!important}.zoom-stage{position:static;transform:none!important;width:auto}
  .schedule{padding:4px}.day-block{page-break-inside:avoid;box-shadow:none}.data-note{display:none}
}

<script>
let viewportGestureActive=false;
let viewportSyncTimer=0;

function eventBelongsToContent(event){
  const shell=document.getElementById("contentShell");
  return Boolean(shell&&event.composedPath().includes(shell));
}

function syncVisualViewport(force=false){
  const root=document.documentElement;
  const vv=window.visualViewport;
  const nativeScale=vv?.scale||1;

  // Safariのネイティブ拡大中は位置情報を書き換えない。
  // 最後に確定した可視領域を維持し、ヘッダーとボトムナビの揺れを防ぐ。
  if(!force&&(viewportGestureActive||Math.abs(nativeScale-1)>.01))return;

  const layoutHeight=Math.max(document.documentElement.clientHeight,window.innerHeight||0);
  const top=vv?Math.max(0,vv.offsetTop):0;
  const visibleHeight=vv?vv.height:(window.innerHeight||layoutHeight);
  const bottom=vv?Math.max(0,layoutHeight-visibleHeight-top):0;
  root.style.setProperty("--visual-top",`${Math.round(top)}px`);
  root.style.setProperty("--visual-bottom",`${Math.round(bottom)}px`);
  root.style.setProperty("--visual-height",`${Math.round(visibleHeight)}px`);
}

function finishViewportGesture(){
  viewportGestureActive=false;
  clearTimeout(viewportSyncTimer);
  viewportSyncTimer=setTimeout(()=>syncVisualViewport(true),120);
}

// ピンチはメインエリアの独自ズームだけに限定する。
// ヘッダー・ボトムナビ・その他の領域ではSafariのネイティブ拡大を開始させない。
document.addEventListener("touchstart",event=>{
  if(event.touches.length<2)return;
  viewportGestureActive=true;
  if(!eventBelongsToContent(event))event.preventDefault();
},{capture:true,passive:false});

document.addEventListener("touchmove",event=>{
  if(event.touches.length<2)return;
  viewportGestureActive=true;
  if(!eventBelongsToContent(event))event.preventDefault();
},{capture:true,passive:false});

document.addEventListener("touchend",event=>{
  if(event.touches.length<2)finishViewportGesture();
},{capture:true,passive:true});
document.addEventListener("touchcancel",finishViewportGesture,{capture:true,passive:true});

for(const type of ["gesturestart","gesturechange","gestureend"]){
  document.addEventListener(type,event=>{
    viewportGestureActive=type!=="gestureend";
    event.preventDefault();
    if(type==="gestureend")finishViewportGesture();
  },{capture:true,passive:false});
}

syncVisualViewport(true);
window.addEventListener("resize",()=>syncVisualViewport(),{passive:true});
window.addEventListener("orientationchange",()=>setTimeout(()=>syncVisualViewport(true),120),{passive:true});
if(window.visualViewport){
  window.visualViewport.addEventListener("resize",()=>syncVisualViewport(),{passive:true});
  window.visualViewport.addEventListener("scroll",()=>syncVisualViewport(),{passive:true});
}

const escapeHtml=value=>String(value??"").replace(/[&<>'"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]));
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function sortRecords(list){return [...list].sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"99:99").localeCompare(b.time||"99:99")||(SPORT_ORDER[a.sport]??9)-(SPORT_ORDER[b.sport]??9)||String(a.name).localeCompare(String(b.name),"ja"))}
function normalizeGrade(sport,grade){
  const value=String(grade||"").trim();
  if(sport!=="nar")return value;
  const match=value.match(/^([HM])([ⅠⅡⅢ１２３123])$/i);
  if(!match)return value;
  const digitMap={"Ⅰ":"1","Ⅱ":"2","Ⅲ":"3","１":"1","２":"2","３":"3"};
  return match[1].toUpperCase()+(digitMap[match[2]]||match[2]);
}
function validate(list){
  if(!Array.isArray(list))throw new Error("最上位は配列にしてください。");
  const allowed=new Set(["jra","nar","boat","keirin","auto"]);
  list.forEach((r,i)=>{
    if(!r||typeof r!=="object")throw new Error(`${i+1}件目がオブジェクトではありません。`);
    if(!/^\d{4}-\d{2}-\d{2}$/.test(String(r.date||"")))throw new Error(`${i+1}件目のdateが不正です。`);
    if(!allowed.has(r.sport))throw new Error(`${i+1}件目のsportが不正です。`);
    if(r.time&&!/^\d{2}:\d{2}$/.test(r.time)&&r.time!=="中止")throw new Error(`${i+1}件目のtimeが不正です。`);
  });
  return sortRecords(list.map(r=>({date:String(r.date),time:String(r.time||""),sport:r.sport,venue:String(r.venue||""),grade:normalizeGrade(r.sport,r.grade),name:String(r.name||""),winner:String(r.winner||"")})));
}
async function fetchPublicData(){
  const response=await fetch("./races.json",{cache:"no-store"});
  if(!response.ok)throw new Error(`HTTP ${response.status}`);
  return validate(await response.json());
}
async function loadInitialData(){
  // 公開データを最優先する。過去のlocalStorageが発走時刻の更新を隠さないようにする。
  try{sourceRecords=await fetchPublicData();records=sourceRecords;return}
  catch(e){console.warn("races.jsonを読み込めませんでした。保存データを確認します。",e)}
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){records=validate(JSON.parse(saved));sourceRecords=records;return;}
  }catch(e){console.warn("保存データを読み込めませんでした",e)}
  sourceRecords=validate(DEFAULT_DATA);records=sourceRecords;
}

function sportIcon(sport){
  const src=SPORT_ICON_DATA[sport]||SPORT_ICON_DATA.jra;
  return `<img class="sport-icon-image" src="${src}" alt="" aria-hidden="true">`;
}
function isTopGrade(sport,grade){
  const g=String(grade||"").replace(/\s+/g,"").replace(/I/g,"Ⅰ");
  if(sport==="jra")return /^(?:GⅠ|J・?GⅠ|障害GⅠ)$/.test(g);
  if(sport==="nar")return /^(?:GⅠ|JpnⅠ)$/.test(g);
  if(sport==="boat")return g==="SG";
  if(sport==="keirin")return /^(?:GP|GⅠ)$/.test(g);
  if(sport==="auto")return g==="SG";
  return false;
}
function rowHtml(r){
  const pending=!r.time;const cancelled=r.time==="中止";const top=isTopGrade(r.sport,r.grade);
  return `<div class="race-row ${escapeHtml(r.sport)}">
    <div class="cell time-cell ${pending?"pending":""} ${cancelled?"cancelled":""}">${escapeHtml(r.time||"")}</div>
    <div class="cell sport-cell" title="${escapeHtml(r.sport)}"><span class="sport-badge">${sportIcon(r.sport)}</span></div>
    <div class="cell venue-cell" title="${escapeHtml(r.venue)}">${escapeHtml(r.venue)}</div>
    <div class="cell grade-cell ${top?"grade-top":""}">${escapeHtml(r.grade)}</div>
    <div class="cell name-cell ${top?"name-top":""}" title="${escapeHtml(r.name)}"><span class="race-name-text">${escapeHtml(r.name)}</span></div>
    <div class="cell winner-cell ${top?"name-top":""}" title="${escapeHtml(r.winner)}"><span>${escapeHtml(r.winner)}</span></div>
  </div>`;
}
function initializeRaceNameMarquees(){
  document.querySelectorAll(".name-cell").forEach(cell=>{
    const text=cell.querySelector(".race-name-text");
    if(!text)return;
    cell.classList.remove("scrolling");
    cell.style.removeProperty("--marquee-distance");
    cell.style.removeProperty("--marquee-duration");
    text.style.transform="none";
    const overflow=Math.ceil(text.scrollWidth-cell.clientWidth);
    if(overflow>2){
      const duration=Math.min(24,Math.max(11,8+overflow/12));
      cell.style.setProperty("--marquee-distance",`${overflow+8}px`);
      cell.style.setProperty("--marquee-duration",`${duration.toFixed(1)}s`);
      cell.classList.add("scrolling");
    }
  });
}
function render(){
  $("loadingState").style.display="none";
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  $("monthTitle").textContent=`${y}年 ${m+1}月`;
  const monthPrefix=`${y}-${String(m+1).padStart(2,"0")}`;
  const monthRecords=records.filter(r=>r.date.startsWith(monthPrefix));
  if(!monthRecords.length){$("schedule").innerHTML='<div class="empty-month">この月の登録レースはありません</div>';updateZoomMetrics(true);return}
  const grouped=new Map();monthRecords.forEach(r=>{if(!grouped.has(r.date))grouped.set(r.date,[]);grouped.get(r.date).push(r)});
  const today=dateKey(new Date());
  $("schedule").innerHTML=[...grouped.entries()].map(([key,list])=>{
    const d=new Date(`${key}T00:00:00`),dow=d.getDay();
    const classes=["day-block",dow===6?"sat":"",dow===0?"sun":"",HOLIDAYS.has(key)?"holiday":"",key===today?"today":""].filter(Boolean).join(" ");
    return `<article class="${classes}" data-date="${key}"><div class="date-cell"><span class="date-number">${d.getDate()}</span><span class="weekday">${WEEKDAYS[dow]}</span></div><div class="race-list">${list.map(rowHtml).join("")}</div></article>`;
  }).join("");
  requestAnimationFrame(()=>{initializeRaceNameMarquees();updateZoomMetrics(true);if(y===new Date().getFullYear()&&m===new Date().getMonth()){const el=document.querySelector(`[data-date="${today}"]`);if(el)$("contentShell").scrollTop=Math.max(0,el.offsetTop*zoom.scale-8)}});
}
function changeMonth(delta){viewDate.setMonth(viewDate.getMonth()+delta);render();$("contentShell").scrollTo({top:0,left:0,behavior:"instant"})}

const INITIAL_SCALE=1.18;
const zoom={scale:INITIAL_SCALE,min:.62,max:1.85,startDistance:INITIAL_SCALE,startScale:INITIAL_SCALE,active:false};
let stageBaseWidth=520;
let contentRightEdge=520;
function clamp(v,min,max){return Math.min(max,Math.max(min,v))}
function touchDistance(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)}
function touchCenter(t,rect){return {x:(t[0].clientX+t[1].clientX)/2-rect.left,y:(t[0].clientY+t[1].clientY)/2-rect.top}}
function setZoom(next,center){
  const shell=$("contentShell"),old=zoom.scale;zoom.min=Math.min(1,Math.max(.62,shell.clientWidth/contentRightEdge));const newScale=clamp(next,zoom.min,zoom.max);
  const cx=center?.x??shell.clientWidth/2,cy=center?.y??shell.clientHeight/2;
  const contentX=(shell.scrollLeft+cx)/old,contentY=(shell.scrollTop+cy)/old;
  zoom.scale=newScale;document.documentElement.style.setProperty("--content-scale",String(newScale));updateZoomMetrics();
  shell.scrollLeft=contentX*newScale-cx;shell.scrollTop=contentY*newScale-cy;
}
function measureContentRightEdge(){
  const rows=[...document.querySelectorAll(".day-block")];
  if(!rows.length)return stageBaseWidth;
  return Math.max(...rows.map(el=>el.offsetLeft+el.offsetWidth));
}
function measureContentBottomEdge(){
  const schedule=$("schedule");
  const empty=document.querySelector(".empty-month");
  const target=empty||schedule;
  if(!target)return 0;
  return Math.max(0,target.offsetTop+target.scrollHeight);
}
function clampScrollBounds(){
  const shell=$("contentShell"),sizer=$("zoomSizer");
  const maxLeft=Math.max(0,sizer.offsetWidth-shell.clientWidth);
  const maxTop=Math.max(0,sizer.offsetHeight-shell.clientHeight);
  if(shell.scrollLeft<0)shell.scrollLeft=0;
  else if(shell.scrollLeft>maxLeft)shell.scrollLeft=maxLeft;
  if(shell.scrollTop<0)shell.scrollTop=0;
  else if(shell.scrollTop>maxTop)shell.scrollTop=maxTop;
}
function updateZoomMetrics(forceBaseWidth=false){
  const stage=$("zoomStage"),sizer=$("zoomSizer"),shell=$("contentShell");
  if(forceBaseWidth){stageBaseWidth=Math.max(520,shell.clientWidth);}
  stage.style.width=`${stageBaseWidth}px`;
  requestAnimationFrame(()=>{
    contentRightEdge=measureContentRightEdge();
    const contentBottomEdge=measureContentBottomEdge();
    zoom.min=Math.min(1,Math.max(.62,shell.clientWidth/contentRightEdge));
    const desiredInitial=Math.min(zoom.max,Math.max(zoom.min,INITIAL_SCALE));
    if(Math.abs(zoom.scale-INITIAL_SCALE)<0.001||zoom.scale<zoom.min){zoom.scale=desiredInitial;document.documentElement.style.setProperty("--content-scale",String(zoom.scale));}
    sizer.style.width=`${Math.ceil(Math.max(shell.clientWidth,contentRightEdge*zoom.scale))}px`;
    sizer.style.height=`${Math.ceil(Math.max(shell.clientHeight,contentBottomEdge*zoom.scale))}px`;
    requestAnimationFrame(clampScrollBounds);
  });
}
function installContentPinch(){
  const shell=$("contentShell");
  const drag={active:false,axis:null,startX:0,startY:0,startLeft:0,lastX:0,lastY:0,lastTime:0,velocityX:0,raf:0};

  function maxScrollLeft(){return Math.max(0,$("zoomSizer").offsetWidth-shell.clientWidth)}
  function maxScrollTop(){return Math.max(0,$("zoomSizer").offsetHeight-shell.clientHeight)}
  function stopHorizontalInertia(){if(drag.raf){cancelAnimationFrame(drag.raf);drag.raf=0}}
  function resetSingleTouch(){drag.active=false;drag.axis=null;drag.velocityX=0}
  function startHorizontalInertia(){
    stopHorizontalInertia();
    let velocity=drag.velocityX;
    if(Math.abs(velocity)<.12)return;
    let previous=performance.now();
    const step=now=>{
      const dt=Math.min(32,now-previous);previous=now;
      const maxLeft=maxScrollLeft();
      const next=clamp(shell.scrollLeft-velocity*dt,0,maxLeft);
      shell.scrollLeft=next;
      if(next<=0||next>=maxLeft)velocity=0;
      velocity*=Math.pow(.94,dt/16.67);
      if(Math.abs(velocity)>.03)drag.raf=requestAnimationFrame(step);
      else{drag.raf=0;clampScrollBounds()}
    };
    drag.raf=requestAnimationFrame(step);
  }

  shell.addEventListener("touchstart",e=>{
    stopHorizontalInertia();
    if(e.touches.length===2){
      resetSingleTouch();
      zoom.active=true;
      zoom.startDistance=touchDistance(e.touches);
      zoom.startScale=zoom.scale;
      return;
    }
    if(e.touches.length===1){
      const t=e.touches[0];
      drag.active=true;drag.axis=null;drag.startX=t.clientX;drag.startY=t.clientY;
      drag.startLeft=clamp(shell.scrollLeft,0,maxScrollLeft());
      drag.lastX=t.clientX;drag.lastY=t.clientY;drag.lastTime=performance.now();drag.velocityX=0;
    }
  },{passive:true});

  shell.addEventListener("touchmove",e=>{
    if(zoom.active&&e.touches.length===2){
      e.preventDefault();
      const rect=shell.getBoundingClientRect();
      setZoom(zoom.startScale*touchDistance(e.touches)/zoom.startDistance,touchCenter(e.touches,rect));
      return;
    }
    if(!drag.active||e.touches.length!==1)return;
    const t=e.touches[0],dx=t.clientX-drag.startX,dy=t.clientY-drag.startY;
    const maxTop=maxScrollTop();
    const atTop=shell.scrollTop<=.5;
    const atBottom=shell.scrollTop>=maxTop-.5;

    // 軸判定前でも、上下端の外側へ引っ張る動作だけは即座に止める。
    if(!drag.axis&&Math.abs(dy)>Math.abs(dx)){
      if((atTop&&dy>0)||(atBottom&&dy<0)||maxTop<=0){
        if(e.cancelable)e.preventDefault();
        shell.scrollTop=atTop||maxTop<=0?0:maxTop;
      }
    }

    if(!drag.axis&&Math.hypot(dx,dy)>=7){
      drag.axis=Math.abs(dx)>Math.abs(dy)*1.25?"x":"y";
    }
    if(drag.axis==="x"){
      e.preventDefault();
      const maxLeft=maxScrollLeft();
      shell.scrollLeft=clamp(drag.startLeft-dx,0,maxLeft);
      const now=performance.now(),dt=Math.max(1,now-drag.lastTime);
      drag.velocityX=(t.clientX-drag.lastX)/dt;
      drag.lastX=t.clientX;drag.lastY=t.clientY;drag.lastTime=now;
    }else if(drag.axis==="y"){
      // 縦スクロール中は横位置を固定し、最上部・最下部を越える動作だけを遮断する。
      const fixed=clamp(drag.startLeft,0,maxScrollLeft());
      if(Math.abs(shell.scrollLeft-fixed)>.5)shell.scrollLeft=fixed;

      const movingDown=t.clientY>drag.lastY; // 指が下へ動く＝上端方向へスクロール
      const movingUp=t.clientY<drag.lastY;   // 指が上へ動く＝下端方向へスクロール
      const currentMaxTop=maxScrollTop();
      const currentAtTop=shell.scrollTop<=.5;
      const currentAtBottom=shell.scrollTop>=currentMaxTop-.5;
      if((currentAtTop&&movingDown)||(currentAtBottom&&movingUp)||currentMaxTop<=0){
        if(e.cancelable)e.preventDefault();
        shell.scrollTop=currentAtTop||currentMaxTop<=0?0:currentMaxTop;
      }
      drag.lastY=t.clientY;
    }
  },{passive:false});

  shell.addEventListener("touchend",e=>{
    if(e.touches.length<2)zoom.active=false;
    if(e.touches.length===0){
      if(drag.axis==="x")startHorizontalInertia();
      resetSingleTouch();
      requestAnimationFrame(clampScrollBounds);
    }
  },{passive:true});
  shell.addEventListener("touchcancel",()=>{
    zoom.active=false;resetSingleTouch();stopHorizontalInertia();requestAnimationFrame(clampScrollBounds);
  },{passive:true});
  shell.addEventListener("scroll",()=>{
    // Safariが端で一時的に範囲外の値を返す場合も、縦横とも即座に戻す。
    const maxLeft=maxScrollLeft(),maxTop=maxScrollTop();
    if(shell.scrollLeft<0)shell.scrollLeft=0;
    else if(shell.scrollLeft>maxLeft)shell.scrollLeft=maxLeft;
    if(shell.scrollTop<0)shell.scrollTop=0;
    else if(shell.scrollTop>maxTop)shell.scrollTop=maxTop;
  },{passive:true});
  shell.addEventListener("gesturestart",e=>e.preventDefault(),{passive:false});
  shell.addEventListener("gesturechange",e=>e.preventDefault(),{passive:false});
  shell.addEventListener("wheel",e=>{if(!e.ctrlKey)return;e.preventDefault();const rect=shell.getBoundingClientRect();setZoom(zoom.scale*Math.exp(-e.deltaY*.003),{x:e.clientX-rect.left,y:e.clientY-rect.top})},{passive:false});
  new ResizeObserver(updateZoomMetrics).observe($("zoomStage"));
}

function openEditor(){$("jsonEditor").value=JSON.stringify(records,null,2);$("editorError").textContent="";$("modalBackdrop").classList.add("open")}
function closeEditor(){$("modalBackdrop").classList.remove("open")}
function downloadJson(){const blob=new Blob([JSON.stringify(records,null,2)+"\n"],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="races.json";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),0)}

$("prevMonth").addEventListener("click",()=>changeMonth(-1));$("nextMonth").addEventListener("click",()=>changeMonth(1));
const todayBtn=$("todayBtn");if(todayBtn)todayBtn.addEventListener("click",()=>{viewDate=new Date();viewDate.setDate(1);render()});const editBtn=$("editBtn");if(editBtn)editBtn.addEventListener("click",openEditor);$("closeModal").addEventListener("click",closeEditor);
$("modalBackdrop").addEventListener("click",e=>{if(e.target===$("modalBackdrop"))closeEditor()});
$("saveData").addEventListener("click",()=>{try{records=validate(JSON.parse($("jsonEditor").value));localStorage.setItem(STORAGE_KEY,JSON.stringify(records));closeEditor();render()}catch(e){$("editorError").textContent=e.message}});
$("loadDefault").addEventListener("click",async()=>{try{sourceRecords=await fetchPublicData()}catch(e){sourceRecords=validate(DEFAULT_DATA)}$("jsonEditor").value=JSON.stringify(sourceRecords,null,2);$("editorError").textContent=""});
$("exportJson").addEventListener("click",downloadJson);
$("importJson").addEventListener("change",async e=>{const file=e.target.files?.[0];if(!file)return;try{$("jsonEditor").value=JSON.stringify(validate(JSON.parse(await file.text())),null,2);$("editorError").textContent=""}catch(err){$("editorError").textContent=err.message}e.target.value=""});
window.addEventListener("resize",()=>{syncVisualViewport();initializeRaceNameMarquees();if(!viewportGestureActive)updateZoomMetrics(true)});

(async()=>{installContentPinch();await loadInitialData();render()})();
</script>
