<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#090909">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="zenrace">
<title>グレードレース | zenrace</title>
<style>
:root{
  --header-h:58px;
  --nav-content-h:62px;
  --nav-safe:max(env(safe-area-inset-bottom),0px);
  --nav-total-h:calc(var(--nav-content-h) + var(--nav-safe));
  --bg:#eef1f5;--panel:#fff;--line:#d8dde6;--text:#18202a;--muted:#738091;
  --gold:#d5ab43;--gold-light:#f2d889;
  --jra:#23834a;--nar:#8b5a2b;--boat:#1876c9;--keirin:#d8661d;--auto:#7545af;
  --sat:#eaf4ff;--sun:#fff0f0;--today:#fff6c8;
  --content-scale:1;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  color:var(--text);background:linear-gradient(180deg,#f8fafc,var(--bg));
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  overscroll-behavior:none;
}
button,textarea{font:inherit}
button{-webkit-tap-highlight-color:transparent}

.topbar{
  position:fixed;inset:0 0 auto 0;z-index:1000;height:calc(var(--header-h) + env(safe-area-inset-top));
  padding-top:env(safe-area-inset-top);display:grid;grid-template-columns:minmax(72px,1fr) auto minmax(72px,1fr);
  align-items:center;color:#fff;background:
    linear-gradient(110deg,rgba(213,171,67,.15),transparent 25%,transparent 70%,rgba(213,171,67,.12)),
    linear-gradient(135deg,#050505,#202020 56%,#080808);
  border-bottom:1px solid rgba(213,171,67,.42);box-shadow:0 5px 18px rgba(0,0,0,.24)
}
.header-side{display:flex;align-items:center;padding:0 10px}.header-side.right{justify-content:flex-end}
.header-btn{
  min-width:52px;height:34px;padding:0 10px;border:1px solid rgba(242,216,137,.42);border-radius:8px;
  color:#f8e8b8;background:rgba(255,255,255,.055);font-size:11px;font-weight:800;cursor:pointer
}
.header-btn:active{background:rgba(213,171,67,.2)}
.month-nav{display:grid;grid-template-columns:34px minmax(112px,auto) 34px;align-items:center;gap:2px}
.month-arrow{width:34px;height:34px;border:0;background:transparent;color:var(--gold-light);font-size:27px;line-height:1;cursor:pointer}
.month-title{text-align:center;color:#fff;font-size:17px;font-weight:900;letter-spacing:.045em;white-space:nowrap}

.content-shell{
  position:fixed;left:0;right:0;top:calc(var(--header-h) + env(safe-area-inset-top));bottom:var(--nav-total-h);
  overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:linear-gradient(180deg,#f6f8fb,#e9edf3);
  touch-action:pan-x pan-y;
}
.zoom-sizer{position:relative;min-width:100%;min-height:100%}
.zoom-stage{
  position:absolute;left:0;top:0;transform:scale(var(--content-scale));transform-origin:0 0;
  width:max(100%,520px);min-height:100%;will-change:transform
}
.schedule{padding:7px 8px 20px}
.zoom-hint{padding:7px 10px 2px;color:#8a94a3;font-size:9px;text-align:right;white-space:nowrap}
.day-block{
  display:grid;grid-template-columns:38px minmax(0,1fr);margin-bottom:3px;overflow:hidden;
  border:1px solid var(--line);border-radius:7px;background:var(--panel);box-shadow:0 1px 4px rgba(15,23,42,.045)
}
.day-block.today{border-color:#d2a52e;box-shadow:0 0 0 1px rgba(210,165,46,.17)}
.date-cell{
  display:flex;align-items:center;justify-content:center;gap:2px;min-height:30px;padding:1px 2px;
  border-right:1px solid var(--line);background:#f8fafc;white-space:nowrap
}
.day-block.sat .date-cell{background:var(--sat)}
.day-block.sun .date-cell,.day-block.holiday .date-cell{background:var(--sun)}
.day-block.today .date-cell{background:var(--today)}
.date-number{font-size:17px;line-height:1;font-weight:950;letter-spacing:-.04em}
.weekday{font-size:7px;line-height:1;font-weight:900;color:var(--muted)}
.day-block.sat .date-number,.day-block.sat .weekday{color:#1769aa}
.day-block.sun .date-number,.day-block.sun .weekday,.day-block.holiday .date-number,.day-block.holiday .weekday{color:#c23d3d}
.race-list{min-width:0}
.race-row{
  --sport:#555;display:grid;grid-template-columns:43px 27px 46px 43px minmax(195px,1fr) 103px;
  align-items:stretch;min-width:457px;min-height:30px;border-bottom:1px solid #e8ebf0;font-size:10.5px
}
.race-row:last-child{border-bottom:0}.race-row:hover{background:#f8fafc}
.race-row.jra{--sport:var(--jra)}.race-row.nar{--sport:var(--nar)}.race-row.boat{--sport:var(--boat)}
.race-row.keirin{--sport:var(--keirin)}.race-row.auto{--sport:var(--auto)}
.cell{min-width:0;display:flex;align-items:center;padding:3px 5px;line-height:1.15;white-space:nowrap}
.time-cell{justify-content:center;border-right:1px solid #edf0f4;font-variant-numeric:tabular-nums;font-weight:850}
.time-cell.pending{color:#9aa3af;font-size:9px}.time-cell.cancelled{color:#c43b3b;font-weight:950}
.sport-cell{justify-content:center;padding:2px 1px;color:var(--sport)}
.sport-icon{display:block;width:23px;height:23px;overflow:visible}
.sport-icon .flip{transform:translate(64px 0) scale(-1 1)}
.venue-cell{justify-content:center;border-left:1px solid #edf0f4;border-right:1px solid #edf0f4;font-weight:900;letter-spacing:-.03em;overflow:hidden;text-overflow:clip}
.grade-cell{justify-content:center;border-right:1px solid #edf0f4;font-weight:850;overflow:hidden}
.name-cell{font-weight:800;overflow:hidden}.name-cell span,.winner-cell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.winner-cell{justify-content:center;border-left:1px solid #edf0f4;font-weight:800;overflow:hidden}
.grade-top,.name-top{color:#c62828}
.empty-month,.loading-state{margin:12px;padding:44px 20px;border:1px dashed #c7ced8;border-radius:11px;background:rgba(255,255,255,.74);color:#8792a0;text-align:center;font-size:12px}
.data-note{padding:0 10px 20px;color:#7c8795;font-size:8.5px;text-align:right;line-height:1.55}

.modal-backdrop{position:fixed;inset:0;z-index:3000;display:none;place-items:center;padding:16px;background:rgba(6,9,14,.72);backdrop-filter:blur(5px)}
.modal-backdrop.open{display:grid}.modal{width:min(900px,96vw);max-height:88dvh;display:grid;grid-template-rows:auto auto minmax(230px,1fr) auto auto;gap:9px;padding:15px;border-radius:14px;background:#fff;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.modal-head,.modal-actions{display:flex;align-items:center;justify-content:space-between;gap:10px}.modal h2{margin:0;font-size:17px}.help{margin:0;color:#6f7a8b;font-size:10px;line-height:1.6}
#jsonEditor{width:100%;min-height:270px;resize:vertical;padding:11px;border:1px solid #cfd6df;border-radius:9px;background:#f8fafc;font:10px/1.5 Consolas,monospace}
.modal-btn{border:1px solid #c9d1dc;border-radius:8px;padding:7px 10px;color:#243041;background:#fff;font-weight:750;cursor:pointer}.modal-btn.primary{color:#fff;border-color:#171d25;background:#171d25}.modal-actions>div{display:flex;gap:6px}.error{min-height:15px;color:#c93636;font-size:10px;font-weight:850}

@media(max-width:430px){
  :root{--header-h:54px;--nav-content-h:60px}
  .topbar{grid-template-columns:68px auto 68px}.header-side{padding:0 7px}.header-btn{min-width:48px;height:32px;padding:0 6px;font-size:10px}
  .month-nav{grid-template-columns:29px minmax(102px,auto) 29px}.month-arrow{width:29px}.month-title{font-size:15px}
  .schedule{padding:5px 5px 16px}.day-block{grid-template-columns:36px minmax(0,1fr)}
  .date-number{font-size:16px}.weekday{font-size:6.5px}
}
@media(display-mode:standalone){
  :root{--header-h:54px;--nav-content-h:58px}
  .zoom-hint{display:none}
}
@media print{
  html,body{height:auto;overflow:visible}.topbar,zenrace-bottom-nav,.modal-backdrop,.zoom-hint{display:none!important}
  .content-shell{position:static;overflow:visible}.zoom-sizer{min-height:0!important;width:auto!important;height:auto!important}.zoom-stage{position:static;transform:none!important;width:auto}
  .schedule{padding:4px}.day-block{page-break-inside:avoid;box-shadow:none}.data-note{display:none}
}
</style>
<script src="../shared/bottom-nav.js" defer></script>
</head>
<body>
<header class="topbar">
  <div class="header-side"><button class="header-btn" id="todayBtn">当月</button></div>
  <div class="month-nav">
    <button class="month-arrow" id="prevMonth" aria-label="前月">‹</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="month-arrow" id="nextMonth" aria-label="翌月">›</button>
  </div>
  <div class="header-side right"><button class="header-btn" id="editBtn">編集</button></div>
</header>

<main class="content-shell" id="contentShell">
  <div class="zoom-sizer" id="zoomSizer">
    <div class="zoom-stage" id="zoomStage">
      <div class="zoom-hint">2本指で一覧のみ拡大・縮小できます</div>
      <div class="loading-state" id="loadingState">日程を読み込んでいます</div>
      <section class="schedule" id="schedule" aria-live="polite"></section>
      <div class="data-note">JRA・地方競馬は重賞施行日、ボートレース・競輪・オートレースは優勝戦・決勝日を掲載。発走時刻・優勝者が未確定の欄は空白です。</div>
    </div>
  </div>
</main>

<zenrace-bottom-nav active="schedule"></zenrace-bottom-nav>

<div class="modal-backdrop" id="modalBackdrop">
  <section class="modal" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
    <div class="modal-head"><h2 id="editorTitle">グレードレースデータ編集</h2><button class="modal-btn" id="closeModal">閉じる</button></div>
    <p class="help">date：YYYY-MM-DD　time：HH:MM / 空欄 / 中止　sport：jra / nar / boat / keirin / auto　venue：開催場　grade：グレード　name：レース名・開催名　winner：優勝者・優勝馬</p>
    <textarea id="jsonEditor" spellcheck="false"></textarea>
    <div class="error" id="editorError"></div>
    <div class="modal-actions">
      <div><button class="modal-btn" id="loadDefault">公開データを再読込</button><button class="modal-btn" id="exportJson">JSON保存</button><label class="modal-btn" style="cursor:pointer">JSON読込<input type="file" id="importJson" accept=".json,application/json" hidden></label></div>
      <div><button class="modal-btn primary" id="saveData">保存して反映</button></div>
    </div>
  </section>
</div>

<script>
const DEFAULT_DATA=[
  {"date":"2026-07-12","time":"15:45","sport":"jra","venue":"福島","grade":"GⅢ","name":"七夕賞","winner":"アスクナイスショー"},
  {"date":"2026-07-12","time":"16:25","sport":"keirin","venue":"前橋","grade":"GⅢ","name":"まえばし七夕賞・CTC杯","winner":"脇本 雄太"},
  {"date":"2026-07-12","time":"16:30","sport":"boat","venue":"戸田","grade":"GⅡ","name":"全国ボートレース甲子園","winner":"大峯 豊"},
  {"date":"2026-07-16","time":"16:50","sport":"nar","venue":"佐賀","grade":"","name":"霧島賞","winner":""},
  {"date":"2026-07-18","time":"20:45","sport":"boat","venue":"蒲郡","grade":"GⅡ","name":"モーターボート大賞","winner":""}
];
const SPORT_ORDER={jra:0,nar:1,boat:2,keirin:3,auto:4};
const STORAGE_KEY="public-racing-grade-schedule-v1";
const WEEKDAYS=["日","月","火","水","木","金","土"];
const HOLIDAYS=new Set([
  "2026-01-01","2026-01-12","2026-02-11","2026-02-23","2026-03-20","2026-04-29","2026-05-03","2026-05-04","2026-05-05","2026-05-06","2026-07-20","2026-08-11","2026-09-21","2026-09-22","2026-09-23","2026-10-12","2026-11-03","2026-11-23",
  "2027-01-01","2027-01-11","2027-02-11","2027-02-23","2027-03-21","2027-03-22"
]);
let records=[];
let sourceRecords=[];
let viewDate=new Date(); viewDate.setDate(1);

const $=id=>document.getElementById(id);
const escapeHtml=value=>String(value??"").replace(/[&<>'"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]));
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function sortRecords(list){return [...list].sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"99:99").localeCompare(b.time||"99:99")||(SPORT_ORDER[a.sport]??9)-(SPORT_ORDER[b.sport]??9)||String(a.name).localeCompare(String(b.name),"ja"))}
function validate(list){
  if(!Array.isArray(list))throw new Error("最上位は配列にしてください。");
  const allowed=new Set(["jra","nar","boat","keirin","auto"]);
  list.forEach((r,i)=>{
    if(!r||typeof r!=="object")throw new Error(`${i+1}件目がオブジェクトではありません。`);
    if(!/^\d{4}-\d{2}-\d{2}$/.test(String(r.date||"")))throw new Error(`${i+1}件目のdateが不正です。`);
    if(!allowed.has(r.sport))throw new Error(`${i+1}件目のsportが不正です。`);
    if(r.time&&!/^\d{2}:\d{2}$/.test(r.time)&&r.time!=="中止")throw new Error(`${i+1}件目のtimeが不正です。`);
  });
  return sortRecords(list.map(r=>({date:String(r.date),time:String(r.time||""),sport:r.sport,venue:String(r.venue||""),grade:String(r.grade||""),name:String(r.name||""),winner:String(r.winner||"")})));
}
async function fetchPublicData(){
  const response=await fetch("./races.json",{cache:"no-store"});
  if(!response.ok)throw new Error(`HTTP ${response.status}`);
  return validate(await response.json());
}
async function loadInitialData(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){records=validate(JSON.parse(saved));sourceRecords=records;return;}
  }catch(e){console.warn("保存データを読み込めませんでした",e)}
  try{sourceRecords=await fetchPublicData();records=sourceRecords;return}
  catch(e){console.warn("races.jsonを読み込めませんでした。埋め込みデータを使います。",e)}
  sourceRecords=validate(DEFAULT_DATA);records=sourceRecords;
}

function sportIcon(sport){
  const common='class="sport-icon" viewBox="0 0 64 40" aria-hidden="true" focusable="false"';
  if(sport==="jra"||sport==="nar")return `<svg ${common}><g class="flip" fill="currentColor"><path d="M8 24c3-7 8-11 16-12l9-1 7-6 7 2 2 5-4 4 4 4-3 3-8-3-4 5-4 10h-4l1-9-8 1-5 8h-4l4-10z"/><circle cx="30" cy="7" r="3"/><path d="M27 9l7 2 4 7-4 2-5-6-5 4-3-2z"/><path d="M18 25l-2 11h-4l2-12zm16-1 5 11h-4l-6-9z"/></g></svg>`;
  if(sport==="boat")return `<svg ${common}><g class="flip" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path fill="currentColor" stroke="none" d="M5 27h34l8-10h5l-4 10h10l-8 7H14z"/><path d="M28 25l5-8h10l4 8"/><circle cx="38" cy="14" r="3" fill="currentColor" stroke="none"/><path d="M35 18l-5 6m8-6 5 5"/><path d="M51 27l6-6 3 1-3 8"/><path d="M7 36h32m5 0h10M3 32h8"/></g></svg>`;
  if(sport==="keirin")return `<svg ${common}><g class="flip" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="29" r="9"/><circle cx="50" cy="29" r="9"/><path d="M14 29l12-13 8 13H14l10-8h14l12 8"/><circle cx="34" cy="8" r="4" fill="currentColor" stroke="none"/><path d="M31 12l-7 7 10 3 8-9m-8 9-2 7m10-16 7 4"/></g></svg>`;
  return `<svg ${common}><g class="flip" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="30" r="8"/><circle cx="51" cy="30" r="8"/><path fill="currentColor" stroke="none" d="M14 27l11-10h15l10 8-5 5H25z"/><circle cx="35" cy="9" r="4" fill="currentColor" stroke="none"/><path d="M32 13l-8 8 12 1 10-8m-10 8 7 6M24 21l-5 8"/><path d="M20 16h13"/></g></svg>`;
}
function isTopGrade(grade){return /^(GⅠ|JpnⅠ|SG|PGⅠ|GP|BGⅠ|MⅠ|SⅠ|SPⅠ|HⅠ|重賞Ⅰ|特GⅠ)$/.test(grade)}
function rowHtml(r){
  const pending=!r.time;const cancelled=r.time==="中止";const top=isTopGrade(r.grade);
  return `<div class="race-row ${escapeHtml(r.sport)}">
    <div class="cell time-cell ${pending?"pending":""} ${cancelled?"cancelled":""}">${escapeHtml(r.time||"未定")}</div>
    <div class="cell sport-cell" title="${escapeHtml(r.sport)}">${sportIcon(r.sport)}</div>
    <div class="cell venue-cell" title="${escapeHtml(r.venue)}">${escapeHtml(r.venue)}</div>
    <div class="cell grade-cell ${top?"grade-top":""}">${escapeHtml(r.grade)}</div>
    <div class="cell name-cell ${top?"name-top":""}" title="${escapeHtml(r.name)}"><span>${escapeHtml(r.name)}</span></div>
    <div class="cell winner-cell ${top?"name-top":""}" title="${escapeHtml(r.winner)}"><span>${escapeHtml(r.winner)}</span></div>
  </div>`;
}
function render(){
  $("loadingState").style.display="none";
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  $("monthTitle").textContent=`${y}年 ${m+1}月`;
  const monthPrefix=`${y}-${String(m+1).padStart(2,"0")}`;
  const monthRecords=records.filter(r=>r.date.startsWith(monthPrefix));
  if(!monthRecords.length){$("schedule").innerHTML='<div class="empty-month">この月の登録レースはありません</div>';updateZoomMetrics();return}
  const grouped=new Map();monthRecords.forEach(r=>{if(!grouped.has(r.date))grouped.set(r.date,[]);grouped.get(r.date).push(r)});
  const today=dateKey(new Date());
  $("schedule").innerHTML=[...grouped.entries()].map(([key,list])=>{
    const d=new Date(`${key}T00:00:00`),dow=d.getDay();
    const classes=["day-block",dow===6?"sat":"",dow===0?"sun":"",HOLIDAYS.has(key)?"holiday":"",key===today?"today":""].filter(Boolean).join(" ");
    return `<article class="${classes}" data-date="${key}"><div class="date-cell"><span class="date-number">${d.getDate()}</span><span class="weekday">${WEEKDAYS[dow]}</span></div><div class="race-list">${list.map(rowHtml).join("")}</div></article>`;
  }).join("");
  requestAnimationFrame(()=>{updateZoomMetrics();if(y===new Date().getFullYear()&&m===new Date().getMonth()){const el=document.querySelector(`[data-date="${today}"]`);if(el)$("contentShell").scrollTop=Math.max(0,el.offsetTop*zoom.scale-8)}});
}
function changeMonth(delta){viewDate.setMonth(viewDate.getMonth()+delta);render();$("contentShell").scrollTo({top:0,left:0,behavior:"instant"})}

const zoom={scale:1,min:.62,max:1.85,startDistance:0,startScale:1,active:false};
function clamp(v,min,max){return Math.min(max,Math.max(min,v))}
function touchDistance(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)}
function touchCenter(t,rect){return {x:(t[0].clientX+t[1].clientX)/2-rect.left,y:(t[0].clientY+t[1].clientY)/2-rect.top}}
function setZoom(next,center){
  const shell=$("contentShell"),old=zoom.scale,newScale=clamp(next,zoom.min,zoom.max);
  const cx=center?.x??shell.clientWidth/2,cy=center?.y??shell.clientHeight/2;
  const contentX=(shell.scrollLeft+cx)/old,contentY=(shell.scrollTop+cy)/old;
  zoom.scale=newScale;document.documentElement.style.setProperty("--content-scale",String(newScale));updateZoomMetrics();
  shell.scrollLeft=contentX*newScale-cx;shell.scrollTop=contentY*newScale-cy;
}
function updateZoomMetrics(){
  const stage=$("zoomStage"),sizer=$("zoomSizer");
  requestAnimationFrame(()=>{sizer.style.width=`${Math.max($("contentShell").clientWidth,stage.scrollWidth*zoom.scale)}px`;sizer.style.height=`${Math.max($("contentShell").clientHeight,stage.scrollHeight*zoom.scale)}px`});
}
function installContentPinch(){
  const shell=$("contentShell");
  shell.addEventListener("touchstart",e=>{if(e.touches.length===2){zoom.active=true;zoom.startDistance=touchDistance(e.touches);zoom.startScale=zoom.scale}}, {passive:true});
  shell.addEventListener("touchmove",e=>{if(zoom.active&&e.touches.length===2){e.preventDefault();const rect=shell.getBoundingClientRect();setZoom(zoom.startScale*touchDistance(e.touches)/zoom.startDistance,touchCenter(e.touches,rect))}}, {passive:false});
  shell.addEventListener("touchend",e=>{if(e.touches.length<2)zoom.active=false},{passive:true});
  shell.addEventListener("touchcancel",()=>zoom.active=false,{passive:true});
  shell.addEventListener("gesturestart",e=>e.preventDefault(),{passive:false});
  shell.addEventListener("gesturechange",e=>e.preventDefault(),{passive:false});
  shell.addEventListener("wheel",e=>{if(!e.ctrlKey)return;e.preventDefault();const rect=shell.getBoundingClientRect();setZoom(zoom.scale*Math.exp(-e.deltaY*.003),{x:e.clientX-rect.left,y:e.clientY-rect.top})},{passive:false});
  new ResizeObserver(updateZoomMetrics).observe($("zoomStage"));
}

function openEditor(){$("jsonEditor").value=JSON.stringify(records,null,2);$("editorError").textContent="";$("modalBackdrop").classList.add("open")}
function closeEditor(){$("modalBackdrop").classList.remove("open")}
function downloadJson(){const blob=new Blob([JSON.stringify(records,null,2)+"\n"],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="races.json";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),0)}

$("prevMonth").addEventListener("click",()=>changeMonth(-1));$("nextMonth").addEventListener("click",()=>changeMonth(1));
$("todayBtn").addEventListener("click",()=>{viewDate=new Date();viewDate.setDate(1);render()});$("editBtn").addEventListener("click",openEditor);$("closeModal").addEventListener("click",closeEditor);
$("modalBackdrop").addEventListener("click",e=>{if(e.target===$("modalBackdrop"))closeEditor()});
$("saveData").addEventListener("click",()=>{try{records=validate(JSON.parse($("jsonEditor").value));localStorage.setItem(STORAGE_KEY,JSON.stringify(records));closeEditor();render()}catch(e){$("editorError").textContent=e.message}});
$("loadDefault").addEventListener("click",async()=>{try{sourceRecords=await fetchPublicData()}catch(e){sourceRecords=validate(DEFAULT_DATA)}$("jsonEditor").value=JSON.stringify(sourceRecords,null,2);$("editorError").textContent=""});
$("exportJson").addEventListener("click",downloadJson);
$("importJson").addEventListener("change",async e=>{const file=e.target.files?.[0];if(!file)return;try{$("jsonEditor").value=JSON.stringify(validate(JSON.parse(await file.text())),null,2);$("editorError").textContent=""}catch(err){$("editorError").textContent=err.message}e.target.value=""});
window.addEventListener("resize",updateZoomMetrics);

(async()=>{installContentPinch();await loadInitialData();render()})();
</script>
</body>
</html>
