<style>
:root{--month-toolbar-h:46px;--header-total-h:calc(var(--category-menu-total-h) + var(--month-toolbar-h));--bg:#e9edf3;--panel:#fff;--line:#dce1e8;--text:#17202b;--muted:#788493;--gold:#d3a638;--jra:#23834a;--nar:#8b5a2b;--boat:#1876c9;--keirin:#d8661d;--auto:#7545af}
*{box-sizing:border-box}
html{background:#090909}
body{margin:0;color:var(--text);background:linear-gradient(180deg,#f6f8fb,var(--bg));font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif}
button{font:inherit;-webkit-tap-highlight-color:transparent}
.month-toolbar{position:fixed;left:0;right:0;top:calc(var(--visual-top,0px) + var(--category-menu-total-h));z-index:9990;height:var(--month-toolbar-h);display:grid;grid-template-columns:34px minmax(112px,auto) 34px 1fr auto;align-items:center;padding:0 9px;color:#fff;background:linear-gradient(180deg,#171717,#0a0a0a);border-bottom:1px solid rgba(213,171,67,.34);box-shadow:0 4px 13px rgba(0,0,0,.20);touch-action:none}
.month-arrow{width:32px;height:32px;border:0;color:#f0cc70;background:transparent;font-size:25px;line-height:1}
.month-title{text-align:center;color:#fff;font-size:15px;font-weight:950;letter-spacing:.04em;white-space:nowrap}
.month-spacer{min-width:0}
.today-btn{height:30px;padding:0 11px;border:1px solid rgba(240,204,112,.36);border-radius:8px;color:#f3dda1;background:rgba(255,255,255,.05);font-size:10px;font-weight:900}
.schedule-page{width:min(100%,760px);margin:0 auto;padding:7px 6px 24px}
.day-block{display:grid;grid-template-columns:41px minmax(0,1fr);margin-bottom:4px;overflow:hidden;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 2px 6px rgba(15,23,42,.055)}
.day-block.today{border-color:#c89a25;box-shadow:0 0 0 1px rgba(200,154,37,.16)}
.date-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:33px;padding:3px 1px;border-right:1px solid var(--line);background:#f7f9fb;white-space:nowrap}
.day-block.sat .date-cell{background:#eaf4ff}.day-block.sun .date-cell{background:#fff0f0}.day-block.today .date-cell{background:#fff5c5}
.date-number{font-size:17px;line-height:1;font-weight:1000}.weekday{margin-top:2px;color:var(--muted);font-size:7px;font-weight:900}
.day-block.sat .date-number,.day-block.sat .weekday{color:#1769aa}.day-block.sun .date-number,.day-block.sun .weekday{color:#c23d3d}
.race-list{min-width:0;overflow:hidden}
.race-row{--sport:#555;display:grid;grid-template-columns:43px 29px 48px 43px minmax(190px,1fr) 92px;align-items:stretch;min-width:445px;min-height:32px;border-bottom:1px solid #e9edf2;font-size:10.5px;background:#fff}
.race-row:last-child{border-bottom:0}.race-row.jra{--sport:var(--jra)}.race-row.nar{--sport:var(--nar)}.race-row.boat{--sport:var(--boat)}.race-row.keirin{--sport:var(--keirin)}.race-row.auto{--sport:var(--auto)}
.cell{min-width:0;display:flex;align-items:center;padding:3px 4px;line-height:1.15;white-space:nowrap}
.time{justify-content:center;font-weight:900;font-variant-numeric:tabular-nums;border-right:1px solid #edf0f4}.time.pending{color:#9aa3af;font-size:9px}
.sport{justify-content:center;padding:2px}.sport-badge{width:23px;height:23px;border-radius:6px;display:grid;place-items:center;overflow:hidden;color:#fff;background:var(--sport);font-size:8px;font-weight:950}
.sport-badge img{width:20px;height:20px;object-fit:contain;filter:brightness(0) invert(1)}
.venue{justify-content:center;border-left:1px solid #edf0f4;border-right:1px solid #edf0f4;font-weight:950;overflow:hidden}
.grade{justify-content:center;border-right:1px solid #edf0f4;font-weight:900;overflow:hidden}
.name{position:relative;overflow:hidden;font-weight:850}.name-text{display:inline-block;min-width:max-content;white-space:nowrap;will-change:transform}.name.scrolling .name-text{animation:racePan var(--race-pan-duration,11s) ease-in-out infinite alternate}
@keyframes racePan{0%,18%{transform:translateX(0)}82%,100%{transform:translateX(calc(-1 * var(--race-pan-distance,0px)))}}
.winner{justify-content:center;border-left:1px solid #edf0f4;font-weight:800;overflow:hidden}.winner span{overflow:hidden;text-overflow:ellipsis}
.empty{margin:18px 8px;padding:48px 18px;border:1px dashed #c5ccd6;border-radius:12px;color:#84909e;background:rgba(255,255,255,.72);text-align:center;font-size:12px;font-weight:800}
@media(max-width:430px){:root{--month-toolbar-h:44px}.month-toolbar{grid-template-columns:29px minmax(100px,auto) 29px 1fr auto;padding-inline:5px}.month-title{font-size:14px}.today-btn{height:28px;padding-inline:9px}.schedule-page{padding:5px 4px 20px}.day-block{grid-template-columns:38px minmax(0,1fr)}}
@media print{zenrace-category-menu,.month-toolbar,zenrace-bottom-nav{display:none!important}.zenrace-content-shell{position:static!important}}
</style>

</head>

const SPORT_LABEL={jra:"JRA",nar:"地方",boat:"ボート",keirin:"競輪",auto:"オート"};
const WEEKDAYS=["日","月","火","水","木","金","土"];
let records=[...DEFAULT_DATA].sort((a,b)=>String(a.date).localeCompare(String(b.date))||(a.time||"99:99").localeCompare(b.time||"99:99"));
let view=new Date(); view.setDate(1);
const pad=n=>String(n).padStart(2,"0");
const key=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const esc=value=>String(value??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
function render(){
  const year=view.getFullYear(),month=view.getMonth();
  document.getElementById('monthTitle').textContent=`${year}年${month+1}月`;
  const first=new Date(year,month,1),last=new Date(year,month+1,0),todayKey=key(new Date());
  const byDate=new Map(); records.filter(r=>{const d=new Date(`${r.date}T00:00:00`);return d.getFullYear()===year&&d.getMonth()===month}).forEach(r=>{if(!byDate.has(r.date))byDate.set(r.date,[]);byDate.get(r.date).push(r)});
  const parts=[];
  for(let day=1;day<=last.getDate();day++){
    const date=new Date(year,month,day),dateKey=key(date),list=byDate.get(dateKey)||[];
    if(!list.length)continue;
    const wd=date.getDay();
    const rows=list.map(r=>`<div class="race-row ${esc(r.sport)}"><div class="cell time ${r.time?'':'pending'}">${esc(r.time||'未定')}</div><div class="cell sport"><span class="sport-badge"><img src="./icons/${esc(r.sport)}.png" alt="" onerror="this.remove();this.parentElement.textContent='${esc((SPORT_LABEL[r.sport]||'?').slice(0,1))}'"></span></div><div class="cell venue">${esc(r.venue)}</div><div class="cell grade">${esc(r.grade)}</div><div class="cell name"><span class="name-text">${esc(r.name||'名称未定')}</span></div><div class="cell winner"><span>${esc(r.winner||'')}</span></div></div>`).join('');
    parts.push(`<section class="day-block ${wd===0?'sun':wd===6?'sat':''} ${dateKey===todayKey?'today':''}" data-date="${dateKey}"><div class="date-cell"><span class="date-number">${day}</span><span class="weekday">${WEEKDAYS[wd]}</span></div><div class="race-list">${rows}</div></section>`);
  }
  const schedule=document.getElementById('schedule'); schedule.innerHTML=parts.length?parts.join(''):'<div class="empty">この月のグレードレースは登録されていません。</div>';
  requestAnimationFrame(()=>{document.querySelectorAll('.name').forEach(cell=>{const text=cell.querySelector('.name-text');const distance=Math.max(0,text.scrollWidth-cell.clientWidth);cell.classList.toggle('scrolling',distance>3);cell.style.setProperty('--race-pan-distance',`${distance+6}px`);cell.style.setProperty('--race-pan-duration',`${Math.max(8,Math.min(18,7+distance/18))}s`)})});
  if(year===new Date().getFullYear()&&month===new Date().getMonth()) requestAnimationFrame(()=>document.querySelector('.day-block.today')?.scrollIntoView({block:'start'}));
}
document.getElementById('prevMonth').addEventListener('click',()=>{view.setMonth(view.getMonth()-1);render()});
document.getElementById('nextMonth').addEventListener('click',()=>{view.setMonth(view.getMonth()+1);render()});
document.getElementById('todayBtn').addEventListener('click',()=>{view=new Date();view.setDate(1);render()});
render();
</script>
